<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>IAOS T4 · DUALIS U53700 · Assistant Holographique</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

:root {
  --bg-dark: #010208;
  --bg-panel: rgba(2, 5, 15, 0.96);
  --glass: rgba(20, 30, 55, 0.3);
  --border-glow: rgba(0, 255, 255, 0.25);
  --cyan: #0ff;
  --cyan-glow: 0 0 12px rgba(0, 255, 255, 0.6);
  --purple: #c084fc;
  --green: #22c55e;
  --red: #ef4444;
  --amber: #f59e0b;
  --text: #e2e8f0;
  --text-dim: #7f8ea3;
}

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg-dark);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
}

/* holographic background */
.holo-bg {
  position: fixed;
  inset: 0;
  background: radial-gradient(circle at 20% 30%, rgba(0, 180, 255, 0.08), transparent 60%),
              repeating-linear-gradient(45deg, rgba(0, 255, 255, 0.02) 0px, rgba(0, 255, 255, 0.02) 2px, transparent 2px, transparent 8px);
  pointer-events: none;
  z-index: 0;
}

/* main container */
.main-container {
  position: relative;
  z-index: 2;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 1.5rem;
  gap: 2rem;
}

.title-wrap {
  text-align: center;
  backdrop-filter: blur(12px);
  padding: 0.5rem 1.8rem;
  border-radius: 80px;
  background: rgba(0, 20, 40, 0.4);
  border: 1px solid rgba(0, 255, 255, 0.2);
}

.hero {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: clamp(2.5rem, 8vw, 4.2rem);
  background: linear-gradient(135deg, #fff, #0ff, #a855f7);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  letter-spacing: -0.02em;
}

.hero-sub {
  font-family: 'Space Mono', monospace;
  font-size: 0.65rem;
  letter-spacing: 3px;
  color: var(--cyan);
  text-shadow: 0 0 4px cyan;
}

/* hologram micro */
.holo-mic {
  position: relative;
  width: 200px;
  height: 200px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: transform 0.2s ease;
}
.holo-mic:active {
  transform: scale(0.96);
}
.mic-holo-ring {
  position: absolute;
  border-radius: 50%;
  border: 1.5px solid rgba(0, 255, 255, 0.4);
  box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
  animation: pulseRing 2.5s infinite;
}
.ring1 { width: 100px; height: 100px; animation-delay: 0s; }
.ring2 { width: 140px; height: 140px; animation-delay: 0.6s; }
.ring3 { width: 180px; height: 180px; animation-delay: 1.2s; }
@keyframes pulseRing {
  0% { transform: scale(0.9); opacity: 0.6; border-color: rgba(0, 255, 255, 0.6); }
  50% { transform: scale(1.05); opacity: 1; border-color: rgba(0, 255, 255, 1); box-shadow: 0 0 25px cyan; }
  100% { transform: scale(0.9); opacity: 0.6; }
}
.mic-core {
  width: 85px;
  height: 85px;
  background: radial-gradient(circle, rgba(0, 255, 255, 0.2), rgba(0, 80, 120, 0.4));
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 2.8rem;
  backdrop-filter: blur(12px);
  border: 1px solid rgba(0, 255, 255, 0.7);
  box-shadow: 0 0 28px rgba(0, 255, 255, 0.4);
  transition: all 0.2s;
  z-index: 5;
}
.mic-core.listening {
  animation: micPulse 1.2s infinite;
  border-color: var(--green);
  box-shadow: 0 0 35px #22c55e;
}
@keyframes micPulse {
  0% { box-shadow: 0 0 10px #22c55e; transform: scale(1);}
  50% { box-shadow: 0 0 35px #22c55e; transform: scale(1.03);}
  100% { box-shadow: 0 0 10px #22c55e; transform: scale(1);}
}
.mic-core.speaking {
  border-color: var(--purple);
  box-shadow: 0 0 30px #c084fc;
  animation: none;
}

.status-pill {
  display: flex;
  gap: 12px;
  background: rgba(0, 10, 25, 0.7);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(0, 255, 255, 0.3);
  border-radius: 60px;
  padding: 8px 24px;
  font-size: 0.8rem;
  font-family: 'Space Mono', monospace;
}
.status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #475569;
  transition: all 0.2s;
}
.status-dot.active {
  background: var(--green);
  box-shadow: 0 0 8px var(--green);
}
.wave {
  display: flex;
  gap: 3px;
  align-items: center;
}
.wave span {
  width: 3px;
  background: var(--cyan);
  border-radius: 2px;
  animation: waveAnim 0.6s infinite alternate;
}
.wave span:nth-child(1) { height: 6px; animation-delay: 0s; }
.wave span:nth-child(2) { height: 12px; animation-delay: 0.1s; }
.wave span:nth-child(3) { height: 18px; animation-delay: 0.2s; }
.wave span:nth-child(4) { height: 10px; animation-delay: 0.3s; }
@keyframes waveAnim {
  from { transform: scaleY(0.4); opacity: 0.5; }
  to { transform: scaleY(1); opacity: 1; }
}

/* PANEL hidden by default */
.info-panel {
  position: fixed;
  top: 0;
  right: 0;
  width: min(92%, 440px);
  height: 100%;
  background: var(--bg-panel);
  backdrop-filter: blur(28px);
  border-left: 1px solid rgba(0, 255, 255, 0.35);
  z-index: 100;
  transform: translateX(100%);
  transition: transform 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1);
  display: flex;
  flex-direction: column;
  box-shadow: -5px 0 40px rgba(0,0,0,0.6);
}
.info-panel.open {
  transform: translateX(0);
}
.panel-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 18px 20px;
  border-bottom: 1px solid rgba(0, 255, 255, 0.2);
  background: rgba(0,0,0,0.3);
}
.panel-header h3 {
  font-family: 'Space Mono', monospace;
  font-size: 0.75rem;
  letter-spacing: 2px;
  color: var(--cyan);
}
.close-panel {
  background: none;
  border: 1px solid rgba(0,255,255,0.3);
  color: var(--text-dim);
  width: 30px;
  height: 30px;
  border-radius: 8px;
  cursor: pointer;
}
.panel-content {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}
/* toggle button */
.panel-toggle {
  position: fixed;
  bottom: 24px;
  right: 24px;
  width: 52px;
  height: 52px;
  border-radius: 30px;
  background: rgba(0, 20, 40, 0.9);
  backdrop-filter: blur(12px);
  border: 1px solid var(--cyan);
  color: var(--cyan);
  font-size: 1.4rem;
  cursor: pointer;
  z-index: 101;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: 0.2s;
  box-shadow: 0 0 12px rgba(0,255,255,0.3);
}
.panel-toggle:hover {
  transform: scale(1.05);
}

/* search & card */
.search-box {
  background: rgba(0, 15, 30, 0.7);
  border: 1px solid rgba(0,255,255,0.25);
  border-radius: 48px;
  display: flex;
  align-items: center;
  padding: 4px 6px 4px 18px;
  gap: 8px;
}
.search-box input {
  flex: 1;
  background: none;
  border: none;
  outline: none;
  color: var(--text);
  font-size: 0.9rem;
  padding: 12px 0;
}
.search-box button {
  background: rgba(0, 255, 255, 0.15);
  border: none;
  padding: 8px 18px;
  border-radius: 40px;
  color: var(--cyan);
  cursor: pointer;
  font-family: 'Space Mono', monospace;
}

.ios-detail-card {
  background: rgba(5, 12, 25, 0.7);
  border: 1px solid rgba(0, 255, 255, 0.3);
  border-radius: 20px;
  overflow: hidden;
  display: none;
  animation: fadeUp 0.25s ease;
}
.ios-detail-card.show {
  display: block;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px);}
  to { opacity: 1; transform: translateY(0);}
}
.card-header {
  padding: 16px;
  border-bottom: 1px solid rgba(0,255,255,0.2);
}
.ios-code {
  font-family: 'Space Mono', monospace;
  font-size: 1.2rem;
  font-weight: 700;
  display: flex;
  gap: 10px;
  align-items: baseline;
  flex-wrap: wrap;
}
.prio-badge {
  font-size: 0.65rem;
  padding: 3px 8px;
  border-radius: 20px;
}
.prio-h { background: rgba(239,68,68,0.2); color: #f87171; }
.prio-m { background: rgba(245,158,11,0.2); color: #fbbf24; }
.prio-l { background: rgba(34,197,94,0.2); color: #4ade80; }
.card-actions {
  padding: 12px 16px;
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  border-bottom: 1px solid rgba(0,255,255,0.1);
}
.action-btn {
  background: rgba(0, 255, 255, 0.08);
  border: 1px solid rgba(0,255,255,0.25);
  padding: 6px 14px;
  border-radius: 30px;
  color: var(--cyan);
  font-size: 0.75rem;
  cursor: pointer;
}
.action-btn.green { background: rgba(34,197,94,0.15); border-color: #22c55e; color: #22c55e; }
.action-btn.red { background: rgba(239,68,68,0.12); border-color: #ef4444; color: #ef4444; }
.card-body {
  padding: 16px;
  font-size: 0.85rem;
  color: var(--text-dim);
}
.chat-area {
  background: rgba(0, 10, 22, 0.6);
  border-radius: 18px;
  border: 1px solid rgba(0,255,255,0.2);
  overflow: hidden;
}
.chat-messages {
  height: 220px;
  overflow-y: auto;
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.message {
  display: flex;
  gap: 8px;
  max-width: 90%;
}
.message.user { align-self: flex-end; flex-direction: row-reverse; }
.message.ai .bubble { background: rgba(0, 120, 200, 0.2); border-radius: 6px 14px 14px 14px; border: 1px solid rgba(0,255,255,0.2);}
.message.user .bubble { background: rgba(124,58,237,0.2); border-radius: 14px 6px 14px 14px; border: 1px solid #a855f7;}
.bubble {
  padding: 8px 12px;
  font-size: 0.8rem;
  line-height: 1.4;
}

/* guide bar */
.guide-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  background: rgba(1, 3, 10, 0.96);
  backdrop-filter: blur(20px);
  border-top: 1px solid var(--cyan);
  padding: 14px 20px;
  z-index: 90;
  transform: translateY(100%);
  transition: transform 0.3s;
}
.guide-bar.active {
  transform: translateY(0);
}
.guide-step {
  font-family: 'Space Mono', monospace;
  font-size: 0.7rem;
  color: var(--green);
}
.guide-text {
  font-size: 0.9rem;
  margin: 8px 0;
}
.guide-buttons {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.guide-btn {
  background: rgba(0, 30, 50, 0.8);
  border: 1px solid rgba(0,255,255,0.3);
  padding: 6px 14px;
  border-radius: 40px;
  color: white;
  font-size: 0.75rem;
  cursor: pointer;
}
.guide-btn.yes { background: rgba(34,197,94,0.2); border-color: #22c55e; color: #22c55e; }
.guide-btn.no { background: rgba(239,68,68,0.2); border-color: #ef4444; color: #ef4444; }

.toast {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: #0a0f1e;
  border: 1px solid cyan;
  border-radius: 40px;
  padding: 8px 20px;
  font-size: 0.8rem;
  opacity: 0;
  transition: 0.2s;
  z-index: 200;
  pointer-events: none;
}
</style>
</head>
<body>
<div class="holo-bg"></div>
<div class="main-container">
  <div class="title-wrap">
    <div class="hero">IAOS T4</div>
    <div class="hero-sub">DUALIS U53700 · ASSISTANT HOLOGRAMME</div>
  </div>
  <div class="holo-mic" id="holoMic">
    <div class="mic-holo-ring ring1"></div>
    <div class="mic-holo-ring ring2"></div>
    <div class="mic-holo-ring ring3"></div>
    <div class="mic-core" id="micCore">🎤</div>
  </div>
  <div class="status-pill">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">Appuyez sur l'hologramme</span>
    <div class="wave" id="waveAnim" style="display:none;"><span></span><span></span><span></span><span></span></div>
  </div>
</div>

<button class="panel-toggle" id="panelToggle">📋</button>

<div class="info-panel" id="infoPanel">
  <div class="panel-header">
    <h3>⚡ IAOS T4 · DIAGNOSTIC</h3>
    <button class="close-panel" id="closePanel">✕</button>
  </div>
  <div class="panel-content">
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="IOS 061, boîte chaude, frein..." autocomplete="off">
      <button id="searchBtn">Chercher</button>
    </div>
    <div class="ios-detail-card" id="iosCard">
      <div class="card-header">
        <div class="ios-code"><span id="iosId">---</span><span id="iosTypeBadge"></span></div>
        <div class="prio-badge" id="iosPrio"></div>
        <div id="iosDesc" style="margin-top:6px; font-size:0.85rem;"></div>
      </div>
      <div class="card-actions">
        <button class="action-btn green" id="guideStartBtn">▶ GUIDAGE</button>
        <button class="action-btn red" id="cancelGuideBtn">✕ ANNULER</button>
        <button class="action-btn" id="homeBtn">⌂ ACCUEIL</button>
        <button class="action-btn" id="newSearchBtn">🔍 NOUVEAU</button>
      </div>
      <div class="card-body" id="iosBody"></div>
    </div>
    <div class="chat-area">
      <div class="chat-messages" id="chatMsgs">
        <div class="message ai"><div class="bubble">✨ Interface holographique active. Dites un numéro IOS ou décrivez une panne.</div></div>
      </div>
    </div>
  </div>
</div>

<div class="guide-bar" id="guideBar">
  <div class="guide-step" id="guideStepLabel">ÉTAPE</div>
  <div class="guide-text" id="guideText"></div>
  <div class="guide-buttons" id="guideBtns">
    <button class="guide-btn yes" id="yesBtn" style="display:none;">✓ OUI</button>
    <button class="guide-btn no" id="noBtn" style="display:none;">✗ NON</button>
    <button class="guide-btn" id="prevStepBtn">← PRÉCÉDENT</button>
    <button class="guide-btn" id="nextStepBtn">SUIVANT →</button>
    <button class="guide-btn" id="cancelGuideBtn2">ANNULER</button>
  </div>
</div>
<div class="toast" id="toastMsg"></div>

<script>
// ==================== DATABASE IOS (extraite du contenu original) ====================
const IOS = {
'061':{id:'061',pri:'h',desc:'Détection boîte chaude',kw:['boite','chaude','surchauffe'],tree:[{t:"Accédez à l'écran Commandes diverses → BOITE CHAUDE.",d:0},{t:"Localisez l'élément et la roue concernée, visitez.",d:0},{t:"Y a-t-il fumée ou forte chaleur ?",d:1,oui:[{t:"Incendie → isolement freins + CHAPITRE 4 SECOURS.",d:0,fin:1}],non:[{t:"Tracez un trait sur les 2 roues, étiquette. Isolez frein (art.3). Vitesse max 30 km/h vers garage.",d:0,fin:1}]}]},
'002':{id:'002',pri:'h',desc:"Défaut majeur relais freinage d'urgence",tree:[{t:"🚨 URGENCE — Appliquez immédiatement CHAPITRE 4 — SECOURS.",d:0,fin:1}]},
'017':{id:'017',pri:'h',desc:'Batteries faibles',tree:[{t:"Vérifiez BP(F-SE) relevé.",d:0},{t:"L'IOS a-t-il disparu ?",d:1,oui:[{t:"✅ Terminé",d:0,fin:1}],non:[{t:"🚨 Appliquez CHAPITRE 4 SECOURS.",d:0,fin:1}]}]},
'083':{id:'083',pri:'h',desc:'Perte frein friction bogie CE1',tree:[{t:"Placez Z(IS)F sur CE1, Z(CO)EV sur ON.",d:0},{t:"Symbole Frein isolé affiché ?",d:1,oui:[{t:"Appliquez page 499, EFAS complet. OK",d:0,fin:1}],non:[{t:"🚨 AVISEZ PC, secours.",d:0,fin:1}]}]},
'173':{id:'173',pri:'h',desc:'Défaut porte',tree:[{t:"Commande centralisée CSL-PUP.",d:0},{t:"L'IOS a disparu ?",d:1,oui:[{t:"✅ Terminé",d:0,fin:1}],non:[{t:"Condamnez la porte (ANNEXE 1).",d:0,fin:1}]}]},
'111':{id:'111',pri:'h',desc:'Déclenchement FS/FU',tree:[{t:"IOS 010 présent ?",d:1,oui:[{t:"SECOURS immédiat",d:0,fin:1}],non:[{t:"Placez Z(ALI-SE) sur SECOURS",d:0},{t:"Disparu ?",d:1,oui:[{t:"✅ OK",d:0,fin:1}],non:[{t:"SECOURS demandé",d:0,fin:1}]}]}]}
};
for(let i=0;i<=247;i++){let id=i.toString().padStart(3,'0');if(!IOS[id])IOS[id]={id:id,pri:'l',desc:'Information technique / retour maintenance',tree:[{t:"Avisez le PC, conformez-vous aux instructions.",d:0,fin:1}],kw:[]};}
Object.assign(IOS,{'000':{id:'000',pri:'h',desc:'Boucle sécurité portes',tree:[{t:"Arrêt 1er quai, aviser PC, appliquer GD.",d:0,fin:1}]}});
const ALIAS = {'boite chaude':'061','boîte chaude':'061','surchauffe':'061','frein friction':'083','batterie faible':'017','urgence':'002','porte defaut':'173','fs fu':'111'};

let currentIOS = null, guideActive = false, guideSteps = [], stepIndex = 0;
let listening = false, speakingFlag = false, micActive = false;
let recognition = null;
const synth = window.speechSynthesis;

// DOM elements
const micCore = document.getElementById('micCore');
const statusDot = document.getElementById('statusDot');
const statusText = document.getElementById('statusText');
const waveAnim = document.getElementById('waveAnim');
const panel = document.getElementById('infoPanel');
const guideBar = document.getElementById('guideBar');
const iosCard = document.getElementById('iosCard');
const toast = (msg) => { let t = document.getElementById('toastMsg'); t.textContent=msg; t.style.opacity='1'; setTimeout(()=>t.style.opacity='0',3000); };

function updateUIForState(state){
  if(state === 'listen'){ micCore.classList.add('listening'); micCore.classList.remove('speaking'); statusDot.classList.add('active'); statusText.innerText = '🎙️ ÉCOUTE ACTIVE ...'; waveAnim.style.display='flex'; }
  else if(state === 'speak'){ micCore.classList.remove('listening'); micCore.classList.add('speaking'); statusDot.style.background='#c084fc'; statusText.innerText = '📢 PARLE ...'; waveAnim.style.display='none'; }
  else { micCore.classList.remove('listening','speaking'); statusDot.classList.remove('active'); statusDot.style.background=''; statusText.innerText = 'Hologramme prêt · Appuyez'; waveAnim.style.display='none'; }
}

function speakText(txt, callback){
  if(speakingFlag) synth.cancel();
  let clean = txt.replace(/[<[\]{}_*#✅🚨]/g, '').replace(/&[a-z]+;/g,'');
  clean = clean.replace(/(\b[A-Z]{2,5}\b)/g, m => m.split('').join(' '));
  const utter = new SpeechSynthesisUtterance(clean);
  utter.lang='fr-FR'; utter.rate=0.9;
  speakingFlag = true; updateUIForState('speak');
  if(listening) stopListening();
  utter.onend = () => { speakingFlag=false; updateUIForState('idle'); if(micActive && !guideActive) startListening(); if(callback)callback(); };
  utter.onerror = () => { speakingFlag=false; updateUIForState('idle'); if(micActive && !guideActive) startListening(); };
  synth.speak(utter);
}

function addMessage(text, role){
  const container = document.getElementById('chatMsgs');
  const div = document.createElement('div');
  div.className = `message ${role}`;
  div.innerHTML = `<div class="bubble">${text}</div>`;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function findIOSByQuery(query){
  let q=query.toLowerCase().trim();
  let match = q.match(/(?:ios\s*)?(\d{3}|\d{1,3})/i);
  if(match){ let id = match[1].padStart(3,'0'); if(IOS[id]) return IOS[id]; }
  for(let [alias, id] of Object.entries(ALIAS)) if(q.includes(alias)) return IOS[id];
  for(let ios of Object.values(IOS)) if(ios.desc.toLowerCase().includes(q) || (ios.kw && ios.kw.some(k=>q.includes(k)))) return ios;
  return null;
}

function showIOSDetails(ios){
  currentIOS = ios;
  guideActive = false; guideBar.classList.remove('active');
  iosCard.classList.add('show');
  document.getElementById('iosId').innerHTML = `IOS-${ios.id}`;
  document.getElementById('iosDesc').innerText = ios.desc;
  let prioClass = ios.pri === 'h' ? 'prio-h' : (ios.pri === 'm' ? 'prio-m' : 'prio-l');
  let prioText = ios.pri === 'h' ? '⚠️ URGENCE' : (ios.pri === 'm' ? '● MOYEN' : 'ℹ️ INFO');
  document.getElementById('iosPrio').innerHTML = prioText;
  document.getElementById('iosPrio').className = `prio-badge ${prioClass}`;
  let bodyHtml = `<div style="font-family:monospace; font-size:0.75rem;">📋 ${ios.tree.length} étapes de guidage disponibles.</div>`;
  document.getElementById('iosBody').innerHTML = bodyHtml;
  addMessage(`🔍 <strong>IOS ${ios.id}</strong> — ${ios.desc}. Dites "démarrer" ou cliquez sur Guidage.`, 'ai');
  speakText(`IOS ${ios.id.split('').join(' ')}. ${ios.desc.substring(0,80)}`);
  if(!panel.classList.contains('open')) panel.classList.add('open');
}

function startGuidage(){
  if(!currentIOS) { addMessage("Aucun IOS actif.",'ai'); return; }
  guideActive = true;
  guideSteps = [...currentIOS.tree];
  stepIndex = 0;
  guideBar.classList.add('active');
  renderStep();
}
function renderStep(){
  if(!guideActive || stepIndex >= guideSteps.length){ finishProcedure("✅ Fin de la procédure."); return; }
  let step = guideSteps[stepIndex];
  if(step.fin){ finishProcedure(step.t || "Procédure achevée."); return; }
  document.getElementById('guideStepLabel').innerHTML = `ÉTAPE ${stepIndex+1}/${guideSteps.length} · IOS ${currentIOS.id}`;
  document.getElementById('guideText').innerHTML = step.t;
  let yesBtn = document.getElementById('yesBtn'), noBtn = document.getElementById('noBtn');
  if(step.d){
    yesBtn.style.display = 'inline-flex'; noBtn.style.display = 'inline-flex';
  } else { yesBtn.style.display = 'none'; noBtn.style.display = 'none'; }
  addMessage(`📌 Étape ${stepIndex+1}: ${step.t}`, 'ai');
  speakText(step.t);
}
function answerYes(){ if(guideActive && guideSteps[stepIndex] && guideSteps[stepIndex].d){ processAnswer(true); } }
function answerNo(){ if(guideActive && guideSteps[stepIndex] && guideSteps[stepIndex].d){ processAnswer(false); } }
function processAnswer(yes){
  let step = guideSteps[stepIndex];
  let next = yes ? (step.oui || []) : (step.non || []);
  addMessage(yes ? "✓ OUI" : "✗ NON", 'user');
  if(next.length === 0){ finishProcedure("✅ Procédure terminée."); return; }
  guideSteps = next;
  stepIndex = 0;
  renderStep();
}
function nextStepAction(){
  if(!guideActive) return;
  let step = guideSteps[stepIndex];
  if(step && step.d){ speakText("Veuillez répondre oui ou non."); addMessage("⚠️ Cette étape nécessite oui/non.",'ai'); return; }
  stepIndex++;
  renderStep();
}
function prevStepAction(){ if(guideActive && stepIndex>0){ stepIndex--; renderStep(); } else speakText("Première étape."); }
function finishProcedure(msg){
  guideActive = false;
  guideBar.classList.remove('active');
  addMessage(msg, 'ai');
  speakText(msg);
  if(currentIOS) addMessage(`🏁 Fin du diagnostic IOS ${currentIOS.id}.`, 'ai');
  currentIOS = null;
}
function cancelProcedure(){
  guideActive = false;
  guideBar.classList.remove('active');
  addMessage("Procédure annulée.", 'ai');
  speakText("Annulation.");
}
function homeReset(){
  cancelProcedure();
  currentIOS = null;
  iosCard.classList.remove('show');
  addMessage("🏠 Retour accueil. Dites un numéro IOS.", 'ai');
  speakText("Retour accueil.");
}
function newSearchReset(){ homeReset(); document.getElementById('searchInput').value=''; }

// VOICE COMMANDS enriched 
function processVoiceCommand(txt){
  let lower = txt.toLowerCase().trim();
  addMessage(`🎤 "${txt}"`, 'user');
  // navigation commands with synonyms
  if(/\b(démarrer|commencer|lance|guidage|guide moi|go|démarre|let's go|ok go)\b/.test(lower)){ if(currentIOS && !guideActive) startGuidage(); else addMessage("Aucun IOS sélectionné. Cherchez d'abord.",'ai'); return; }
  if(/\b(suivant|passe à la suite|après|ensuite|prochaine étape|et ensuite|la suite|ok suivant|c'est quoi la suite|continuer|continue|ok|d'accord|suivant étape|next)\b/.test(lower) && !/(^non |pas |ne )/.test(lower)){ if(guideActive) nextStepAction(); else addMessage("Aucun guidage actif.",'ai'); return; }
  if(/\b(précédent|precedent|retour arrière|en arrière|recule|back|arrière|avant)\b/.test(lower)){ if(guideActive) prevStepAction(); return; }
  if(/\b(oui|yes|affirmatif|correct|exact|bien sûr|j'ai fait|confirmé|toujours|allumé|présent|ok c'est bon)\b/.test(lower) && !/\bnon\b/.test(lower)){ if(guideActive && guideSteps[stepIndex] && guideSteps[stepIndex].d) answerYes(); else addMessage("Je n'attend pas de oui actuellement.",'ai'); return; }
  if(/\b(non|no|négatif|pas du tout|faux|disparu|absent|éteint|plus affiché|pas de blocage|aucun)\b/.test(lower)){ if(guideActive && guideSteps[stepIndex] && guideSteps[stepIndex].d) answerNo(); else addMessage("Pas de question oui/non en cours.",'ai'); return; }
  if(/\b(annuler|stop|arrête|interrompt|abandonne|annule la procédure)\b/.test(lower)){ cancelProcedure(); return; }
  if(/\b(accueil|menu|menu principal|retour accueil|home|quitter)\b/.test(lower)){ homeReset(); return; }
  if(/\b(répète|redis|encore|redire|répéter|dis moi encore|what|say again)\b/.test(lower)){
    if(guideActive && guideSteps[stepIndex]) speakText(guideSteps[stepIndex].t);
    else if(currentIOS) speakText(currentIOS.desc);
    else speakText("Aucune instruction en mémoire.");
    return;
  }
  // Search
  let iosFound = findIOSByQuery(lower);
  if(iosFound){ showIOSDetails(iosFound); }
  else { addMessage(`Aucun résultat pour "${txt}". Essayez "IOS 061" ou "boîte chaude".`,'ai'); speakText("Aucun IOS trouvé."); }
}

// Speech Recognition
function startListening(){
  if(!window.SpeechRecognition && !window.webkitSpeechRecognition){ toast("Reconnaissance non supportée"); return; }
  if(speakingFlag || listening) return;
  let SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang = 'fr-FR';
  recognition.continuous = false;
  recognition.interimResults = false;
  recognition.onstart = () => { listening = true; micActive = true; updateUIForState('listen'); };
  recognition.onresult = (e) => { let t = e.results[0][0].transcript; processVoiceCommand(t); };
  recognition.onerror = () => { listening = false; if(micActive && !speakingFlag) setTimeout(startListening, 400); updateUIForState('idle'); };
  recognition.onend = () => { listening = false; if(micActive && !speakingFlag && !guideActive) setTimeout(startListening, 300); updateUIForState('idle'); };
  recognition.start();
}
function stopListening(){ if(recognition){ try{ recognition.stop(); }catch(e){} recognition=null; } listening=false; micActive=false; updateUIForState('idle'); }

// UI events
document.getElementById('holoMic').addEventListener('click', ()=>{
  if(speakingFlag) return;
  if(!micActive){ micActive=true; startListening(); }
  else { stopListening(); micActive=false; }
});
document.getElementById('panelToggle').addEventListener('click',()=>{ panel.classList.toggle('open'); });
document.getElementById('closePanel').addEventListener('click',()=>{ panel.classList.remove('open'); });
document.getElementById('searchBtn').addEventListener('click',()=>{ let val=document.getElementById('searchInput').value; if(val) processVoiceCommand(val); });
document.getElementById('guideStartBtn').addEventListener('click',startGuidage);
document.getElementById('cancelGuideBtn').addEventListener('click',cancelProcedure);
document.getElementById('homeBtn').addEventListener('click',homeReset);
document.getElementById('newSearchBtn').addEventListener('click',newSearchReset);
document.getElementById('yesBtn').addEventListener('click',answerYes);
document.getElementById('noBtn').addEventListener('click',answerNo);
document.getElementById('nextStepBtn').addEventListener('click',nextStepAction);
document.getElementById('prevStepBtn').addEventListener('click',prevStepAction);
document.getElementById('cancelGuideBtn2').addEventListener('click',cancelProcedure);
document.getElementById('searchInput').addEventListener('keypress',e=>{ if(e.key==='Enter') processVoiceCommand(e.target.value); });

updateUIForState('idle');
</script>
