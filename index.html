<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>IAOS T4 · DUALIS U53700 · Assistant Holographique</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

:root {
  --bg-dark: #010208;
  --bg-panel: rgba(2, 5, 15, 0.96);
  --cyan: #0ff;
  --purple: #c084fc;
  --green: #22c55e;
  --red: #ef4444;
  --amber: #f59e0b;
  --text: #e2e8f0;
  --text-dim: #7f8ea3;
}

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg-dark);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
}

/* Fond simple */
.holo-bg {
  position: fixed;
  inset: 0;
  background: 
    radial-gradient(circle at 15% 25%, rgba(0, 200, 255, 0.04), transparent 50%),
    radial-gradient(circle at 85% 70%, rgba(180, 100, 255, 0.03), transparent 50%);
  pointer-events: none;
  z-index: 0;
}

/* Conteneur principal */
.main-container {
  position: relative;
  z-index: 2;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  min-height: 100vh;
  padding: 1.5rem;
  gap: 1.5rem;
  padding-bottom: 120px;
}

/* Titre */
.title-wrap {
  text-align: center;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  padding: 0.6rem 2rem;
  border-radius: 80px;
  background: rgba(0, 20, 40, 0.35);
  border: 1px solid rgba(0, 255, 255, 0.15);
  width: 100%;
  max-width: 600px;
}

.hero {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: clamp(2.5rem, 8vw, 4.2rem);
  background: linear-gradient(135deg, #ffffff, #00ffff, #c084fc, #00ffff);
  background-size: 300% 300%;
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  letter-spacing: -0.02em;
  animation: titleShimmer 4s ease-in-out infinite;
}

@keyframes titleShimmer {
  0%, 100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}

.hero-sub {
  font-family: 'Space Mono', monospace;
  font-size: 0.6rem;
  letter-spacing: 4px;
  color: var(--cyan);
  text-shadow: 0 0 8px cyan, 0 0 16px rgba(0, 255, 255, 0.5);
}

/* ==================== AFFICHAGE IOS SUR L'ÉCRAN PRINCIPAL ==================== */
.active-ios-display {
  width: 100%;
  max-width: 600px;
  background: rgba(5, 12, 25, 0.8);
  border: 1px solid rgba(0, 255, 255, 0.3);
  border-radius: 20px;
  padding: 18px;
  display: none;
  animation: fadeUp 0.3s ease;
  backdrop-filter: blur(8px);
}

.active-ios-display.show {
  display: block;
}

.active-ios-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 10px;
  margin-bottom: 8px;
}

.active-ios-id {
  font-family: 'Space Mono', monospace;
  font-size: 1.4rem;
  font-weight: 700;
  color: #fff;
  text-shadow: 0 0 10px rgba(0, 255, 255, 0.4);
}

.active-ios-desc {
  font-size: 0.9rem;
  color: #e2e8f0;
  margin-bottom: 6px;
}

.active-ios-meta {
  display: flex;
  gap: 10px;
  align-items: center;
  flex-wrap: wrap;
  font-size: 0.7rem;
  font-family: 'Space Mono', monospace;
}

/* ==================== WAVE ANIMÉE DU MICRO ==================== */
.mic-wave-container {
  position: relative;
  width: 200px;
  height: 200px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: transform 0.2s ease;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  flex-shrink: 0;
}

.mic-wave-container:active {
  transform: scale(0.95);
}

.mic-ring {
  position: absolute;
  border-radius: 50%;
  border: 1.5px solid rgba(0, 255, 255, 0.3);
  animation: pulseRing 2.8s infinite ease-in-out;
}

.mic-ring:nth-child(1) { width: 95px; height: 95px; animation-delay: 0s; }
.mic-ring:nth-child(2) { width: 135px; height: 135px; animation-delay: 0.5s; }
.mic-ring:nth-child(3) { width: 175px; height: 175px; animation-delay: 1s; }

@keyframes pulseRing {
  0% { transform: scale(0.93); opacity: 0.5; border-color: rgba(0, 255, 255, 0.4); }
  50% { transform: scale(1.04); opacity: 1; border-color: rgba(0, 255, 255, 0.9); box-shadow: 0 0 18px rgba(0, 255, 255, 0.4); }
  100% { transform: scale(0.93); opacity: 0.5; border-color: rgba(0, 255, 255, 0.4); }
}

.wave-bars {
  position: relative;
  z-index: 5;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
  height: 60px;
  width: 80px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(0, 255, 255, 0.1), transparent 70%);
  transition: all 0.3s ease;
}

.wave-bar {
  width: 5px;
  border-radius: 3px;
  background: var(--cyan);
  box-shadow: 0 0 8px rgba(0, 255, 255, 0.5);
  transition: all 0.15s ease;
  animation: waveBarAnim 0.8s infinite ease-in-out;
}

.wave-bar:nth-child(1) { height: 18px; animation-delay: 0s; }
.wave-bar:nth-child(2) { height: 30px; animation-delay: 0.1s; }
.wave-bar:nth-child(3) { height: 42px; animation-delay: 0.2s; }
.wave-bar:nth-child(4) { height: 30px; animation-delay: 0.3s; }
.wave-bar:nth-child(5) { height: 18px; animation-delay: 0.4s; }

@keyframes waveBarAnim {
  0%, 100% { transform: scaleY(0.5); opacity: 0.5; }
  50% { transform: scaleY(1); opacity: 1; }
}

.wave-bars.idle .wave-bar { background: var(--cyan); box-shadow: 0 0 8px rgba(0, 255, 255, 0.5); }
.wave-bars.listening .wave-bar { background: var(--green); box-shadow: 0 0 12px rgba(34, 197, 94, 0.7), 0 0 24px rgba(34, 197, 94, 0.3); animation-duration: 0.5s; }
.wave-bars.speaking .wave-bar { background: var(--purple); box-shadow: 0 0 12px rgba(192, 132, 252, 0.7), 0 0 24px rgba(192, 132, 252, 0.3); animation-duration: 0.6s; }
.wave-bars.error .wave-bar { background: var(--red); box-shadow: 0 0 10px rgba(239, 68, 68, 0.6); animation: errorShake 0.4s; }

@keyframes errorShake {
  0%, 100% { transform: translateX(0) scaleY(1); }
  20% { transform: translateX(-5px) scaleY(0.7); }
  40% { transform: translateX(5px) scaleY(1.2); }
  60% { transform: translateX(-3px) scaleY(0.8); }
  80% { transform: translateX(3px) scaleY(1.1); }
}

.mic-wave-container.listening .mic-ring { border-color: rgba(34, 197, 94, 0.5) !important; animation-duration: 1.8s; }
.mic-wave-container.speaking .mic-ring { border-color: rgba(192, 132, 252, 0.5) !important; animation-duration: 1.6s; }
.mic-wave-container.error .mic-ring { border-color: rgba(239, 68, 68, 0.5) !important; }

/* Barre de statut */
.status-pill {
  display: flex;
  gap: 12px;
  align-items: center;
  background: rgba(0, 10, 25, 0.7);
  backdrop-filter: blur(8px);
  border: 1px solid rgba(0, 255, 255, 0.3);
  border-radius: 60px;
  padding: 10px 26px;
  font-size: 0.8rem;
  font-family: 'Space Mono', monospace;
}

.status-dot {
  width: 9px;
  height: 9px;
  border-radius: 50%;
  background: #475569;
  transition: all 0.3s ease;
  flex-shrink: 0;
}

.status-dot.active { background: var(--green); box-shadow: 0 0 10px var(--green); }
.status-dot.speaking { background: var(--purple); box-shadow: 0 0 10px var(--purple); }

/* Overlay du panneau */
.panel-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.5);
  z-index: 98;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
}

.panel-overlay.active { opacity: 1; pointer-events: auto; }

/* Panneau d'information */
.info-panel {
  position: fixed;
  top: 0;
  right: 0;
  width: min(94%, 450px);
  height: 100%;
  background: var(--bg-panel);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-left: 1px solid rgba(0, 255, 255, 0.35);
  z-index: 100;
  transform: translateX(105%);
  transition: transform 0.35s cubic-bezier(0.22, 0.61, 0.36, 1);
  display: flex;
  flex-direction: column;
  box-shadow: -8px 0 40px rgba(0, 0, 0, 0.6);
}

.info-panel.open { transform: translateX(0); }

.panel-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 18px 20px;
  border-bottom: 1px solid rgba(0, 255, 255, 0.2);
  background: rgba(0, 0, 0, 0.4);
}

.panel-header h3 {
  font-family: 'Space Mono', monospace;
  font-size: 0.7rem;
  letter-spacing: 3px;
  color: var(--cyan);
  text-shadow: 0 0 6px rgba(0, 255, 255, 0.5);
}

.close-panel {
  background: rgba(0, 0, 0, 0.3);
  border: 1px solid rgba(0, 255, 255, 0.3);
  color: var(--text-dim);
  width: 34px;
  height: 34px;
  border-radius: 10px;
  cursor: pointer;
  font-size: 1rem;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}

.close-panel:hover { background: rgba(239, 68, 68, 0.2); border-color: var(--red); color: var(--red); }

.panel-content {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 18px;
}

/* Bouton toggle */
.panel-toggle {
  position: fixed;
  bottom: 28px;
  right: 28px;
  width: 56px;
  height: 56px;
  border-radius: 30px;
  background: rgba(0, 20, 40, 0.9);
  backdrop-filter: blur(12px);
  border: 1.5px solid rgba(0, 255, 255, 0.5);
  color: var(--cyan);
  font-size: 1.6rem;
  cursor: pointer;
  z-index: 102;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.3s ease;
  box-shadow: 0 0 18px rgba(0, 255, 255, 0.25), 0 4px 18px rgba(0, 0, 0, 0.5);
}

.panel-toggle:hover { transform: scale(1.06); box-shadow: 0 0 28px rgba(0, 255, 255, 0.4); }
.panel-toggle:active { transform: scale(0.94); }
.panel-toggle .gear-icon { display: inline-block; transition: transform 0.5s ease; }
.panel-toggle:hover .gear-icon { transform: rotate(90deg); }
.panel-toggle.panel-open .gear-icon { transform: rotate(180deg); }

/* Zone de recherche */
.search-box {
  background: rgba(0, 15, 30, 0.7);
  border: 1px solid rgba(0, 255, 255, 0.25);
  border-radius: 50px;
  display: flex;
  align-items: center;
  padding: 5px 6px 5px 20px;
  gap: 10px;
}

.search-box input {
  flex: 1;
  background: none;
  border: none;
  outline: none;
  color: var(--text);
  font-size: 0.9rem;
  padding: 12px 0;
  font-family: 'DM Sans', sans-serif;
}

.search-box input::placeholder { color: var(--text-dim); }

.search-box button {
  background: rgba(0, 255, 255, 0.15);
  border: 1px solid rgba(0, 255, 255, 0.3);
  padding: 9px 20px;
  border-radius: 40px;
  color: var(--cyan);
  cursor: pointer;
  font-family: 'Space Mono', monospace;
  font-size: 0.75rem;
  transition: all 0.2s;
}

.search-box button:hover { background: rgba(0, 255, 255, 0.3); }

/* Carte de détail IOS */
.ios-detail-card {
  background: rgba(5, 12, 25, 0.8);
  border: 1px solid rgba(0, 255, 255, 0.3);
  border-radius: 22px;
  overflow: hidden;
  display: none;
  animation: fadeUp 0.3s ease;
}

.ios-detail-card.show { display: block; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

.card-header { padding: 18px; border-bottom: 1px solid rgba(0, 255, 255, 0.2); }

.ios-code {
  font-family: 'Space Mono', monospace;
  font-size: 1.3rem;
  font-weight: 700;
  display: flex;
  gap: 10px;
  align-items: baseline;
  flex-wrap: wrap;
  color: #fff;
}

.prio-badge {
  font-size: 0.6rem;
  padding: 4px 10px;
  border-radius: 20px;
  display: inline-block;
  margin-top: 6px;
  font-family: 'Space Mono', monospace;
  letter-spacing: 1px;
}

.prio-h { background: rgba(239, 68, 68, 0.2); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.4); animation: prioUrgentPulse 1.5s infinite; }
@keyframes prioUrgentPulse {
  0%, 100% { box-shadow: 0 0 5px rgba(239, 68, 68, 0.3); }
  50% { box-shadow: 0 0 15px rgba(239, 68, 68, 0.6); }
}
.prio-m { background: rgba(245, 158, 11, 0.2); color: #fbbf24; border: 1px solid rgba(245, 158, 11, 0.4); }
.prio-l { background: rgba(34, 197, 94, 0.2); color: #4ade80; border: 1px solid rgba(34, 197, 94, 0.4); }

.card-actions {
  padding: 14px 18px;
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  border-bottom: 1px solid rgba(0, 255, 255, 0.1);
}

.action-btn {
  background: rgba(0, 255, 255, 0.06);
  border: 1px solid rgba(0, 255, 255, 0.25);
  padding: 7px 16px;
  border-radius: 30px;
  color: var(--cyan);
  font-size: 0.75rem;
  cursor: pointer;
  transition: all 0.2s;
  font-family: 'DM Sans', sans-serif;
}

.action-btn:hover { background: rgba(0, 255, 255, 0.18); transform: translateY(-1px); }
.action-btn:active { transform: translateY(0); }
.action-btn.green { background: rgba(34, 197, 94, 0.12); border-color: rgba(34, 197, 94, 0.5); color: #22c55e; }
.action-btn.green:hover { background: rgba(34, 197, 94, 0.25); box-shadow: 0 0 15px rgba(34, 197, 94, 0.25); }
.action-btn.red { background: rgba(239, 68, 68, 0.08); border-color: rgba(239, 68, 68, 0.4); color: #ef4444; }
.action-btn.red:hover { background: rgba(239, 68, 68, 0.2); box-shadow: 0 0 15px rgba(239, 68, 68, 0.25); }

.card-body { padding: 18px; font-size: 0.85rem; color: var(--text-dim); line-height: 1.6; }

/* Zone de chat */
.chat-area {
  background: rgba(0, 10, 22, 0.6);
  border-radius: 20px;
  border: 1px solid rgba(0, 255, 255, 0.2);
  overflow: hidden;
}

.chat-messages {
  height: 240px;
  overflow-y: auto;
  padding: 14px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.chat-messages::-webkit-scrollbar { width: 4px; }
.chat-messages::-webkit-scrollbar-track { background: transparent; }
.chat-messages::-webkit-scrollbar-thumb { background: rgba(0, 255, 255, 0.25); border-radius: 2px; }

.message { display: flex; gap: 8px; max-width: 88%; animation: messageIn 0.25s ease; }
@keyframes messageIn {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}
.message.user { align-self: flex-end; flex-direction: row-reverse; }
.message.ai .bubble { background: rgba(0, 120, 200, 0.15); border-radius: 6px 16px 16px 16px; border: 1px solid rgba(0, 255, 255, 0.2); }
.message.user .bubble { background: rgba(124, 58, 237, 0.15); border-radius: 16px 6px 16px 16px; border: 1px solid rgba(168, 85, 247, 0.4); }
.bubble { padding: 10px 14px; font-size: 0.82rem; line-height: 1.5; word-break: break-word; }

/* Barre de guidage */
.guide-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  background: rgba(1, 3, 12, 0.97);
  backdrop-filter: blur(20px);
  border-top: 1px solid rgba(0, 255, 255, 0.4);
  padding: 16px 22px;
  z-index: 90;
  transform: translateY(100%);
  transition: transform 0.35s cubic-bezier(0.22, 0.61, 0.36, 1);
  box-shadow: 0 -6px 30px rgba(0, 0, 0, 0.5);
}

.guide-bar.active { transform: translateY(0); }

.guide-step {
  font-family: 'Space Mono', monospace;
  font-size: 0.65rem;
  color: var(--green);
  letter-spacing: 2px;
}

.guide-text { font-size: 0.95rem; margin: 10px 0; line-height: 1.5; font-weight: 500; }

.guide-buttons { display: flex; gap: 10px; flex-wrap: wrap; }

.guide-btn {
  background: rgba(0, 30, 50, 0.8);
  border: 1px solid rgba(0, 255, 255, 0.3);
  padding: 8px 18px;
  border-radius: 40px;
  color: white;
  font-size: 0.75rem;
  cursor: pointer;
  transition: all 0.2s;
  font-family: 'DM Sans', sans-serif;
}

.guide-btn:hover { background: rgba(0, 255, 255, 0.2); }
.guide-btn:active { transform: scale(0.95); }
.guide-btn.yes { background: rgba(34, 197, 94, 0.2); border-color: rgba(34, 197, 94, 0.5); color: #22c55e; font-weight: 600; }
.guide-btn.yes:hover { background: rgba(34, 197, 94, 0.35); box-shadow: 0 0 18px rgba(34, 197, 94, 0.25); }
.guide-btn.no { background: rgba(239, 68, 68, 0.2); border-color: rgba(239, 68, 68, 0.5); color: #ef4444; font-weight: 600; }
.guide-btn.no:hover { background: rgba(239, 68, 68, 0.35); box-shadow: 0 0 18px rgba(239, 68, 68, 0.25); }

/* Toast */
.toast {
  position: fixed;
  top: 24px;
  left: 50%;
  transform: translateX(-50%);
  background: #0a0f1e;
  border: 1px solid cyan;
  border-radius: 40px;
  padding: 10px 24px;
  font-size: 0.8rem;
  opacity: 0;
  transition: opacity 0.3s ease;
  z-index: 200;
  pointer-events: none;
  backdrop-filter: blur(8px);
  box-shadow: 0 4px 16px rgba(0, 0, 0, 0.5);
  font-family: 'Space Mono', monospace;
}

.toast.show { opacity: 1; }

/* ==================== LISTE DES IOS ==================== */
.ios-list-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.7);
  z-index: 150;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
}

.ios-list-overlay.active { opacity: 1; pointer-events: auto; }

.ios-list-panel {
  background: rgba(2, 5, 18, 0.98);
  border: 1px solid rgba(0, 255, 255, 0.4);
  border-radius: 24px;
  width: min(90%, 500px);
  max-height: 80vh;
  display: flex;
  flex-direction: column;
  box-shadow: 0 0 40px rgba(0, 0, 0, 0.8);
  overflow: hidden;
}

.ios-list-header {
  padding: 16px 20px;
  border-bottom: 1px solid rgba(0, 255, 255, 0.3);
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: rgba(0, 0, 0, 0.4);
}

.ios-list-header h3 {
  font-family: 'Space Mono', monospace;
  color: var(--cyan);
  font-size: 0.8rem;
  letter-spacing: 2px;
}

.ios-list-close {
  background: none;
  border: 1px solid rgba(0, 255, 255, 0.3);
  color: var(--text-dim);
  width: 30px;
  height: 30px;
  border-radius: 8px;
  cursor: pointer;
}

.ios-list-scroll {
  overflow-y: auto;
  flex: 1;
  padding: 10px;
}

.ios-list-item {
  padding: 12px 16px;
  border-bottom: 1px solid rgba(0, 255, 255, 0.1);
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 12px;
  border-radius: 10px;
  margin: 2px 0;
}

.ios-list-item:hover {
  background: rgba(0, 255, 255, 0.1);
}

.ios-list-num {
  font-family: 'Space Mono', monospace;
  font-weight: 700;
  color: var(--cyan);
  min-width: 45px;
  font-size: 0.9rem;
}

.ios-list-desc {
  font-size: 0.85rem;
  color: var(--text);
}

.ios-list-prio {
  margin-left: auto;
  font-size: 0.6rem;
  padding: 2px 8px;
  border-radius: 12px;
  font-family: 'Space Mono', monospace;
}

.ios-list-prio.h { background: rgba(239, 68, 68, 0.2); color: #f87171; }
.ios-list-prio.m { background: rgba(245, 158, 11, 0.2); color: #fbbf24; }
.ios-list-prio.l { background: rgba(34, 197, 94, 0.2); color: #4ade80; }

/* ==================== MODALE RÉCAPITULATIF ==================== */
.recap-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.75);
  z-index: 160;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
}

.recap-overlay.active { opacity: 1; pointer-events: auto; }

.recap-panel {
  background: #ffffff;
  border-radius: 16px;
  width: min(92%, 550px);
  max-height: 85vh;
  display: flex;
  flex-direction: column;
  box-shadow: 0 10px 50px rgba(0, 0, 0, 0.5);
  overflow: hidden;
}

.recap-header {
  padding: 16px 20px;
  border-bottom: 1px solid #e2e8f0;
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: #f8fafc;
}

.recap-header h3 {
  font-family: 'Space Mono', monospace;
  color: #1e293b;
  font-size: 0.85rem;
}

.recap-close {
  background: none;
  border: 1px solid #cbd5e1;
  color: #64748b;
  width: 30px;
  height: 30px;
  border-radius: 8px;
  cursor: pointer;
}

.recap-content {
  padding: 24px;
  overflow-y: auto;
  flex: 1;
  color: #1e293b;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.85rem;
  line-height: 1.7;
  white-space: pre-wrap;
}

.recap-actions {
  padding: 14px 20px;
  border-top: 1px solid #e2e8f0;
  display: flex;
  gap: 10px;
  justify-content: flex-end;
  background: #f8fafc;
}

.recap-btn {
  padding: 8px 18px;
  border-radius: 30px;
  border: 1px solid #cbd5e1;
  background: white;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.8rem;
  transition: all 0.2s;
}

.recap-btn.primary {
  background: #1e293b;
  color: white;
  border-color: #1e293b;
}

.recap-btn:hover { transform: translateY(-1px); }

/* ==================== QUESTIONS FIN DE PROCÉDURE ==================== */
.end-questions {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  background: rgba(1, 3, 12, 0.97);
  backdrop-filter: blur(20px);
  border-top: 1px solid rgba(0, 255, 255, 0.4);
  padding: 16px 22px;
  z-index: 91;
  transform: translateY(100%);
  transition: transform 0.35s ease;
  box-shadow: 0 -6px 30px rgba(0, 0, 0, 0.5);
}

.end-questions.active { transform: translateY(0); }

.end-questions-text {
  font-size: 0.9rem;
  margin-bottom: 10px;
}

.end-questions-buttons {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

/* Responsive */
@media (max-width: 480px) {
  .main-container { padding: 1rem; gap: 1rem; padding-bottom: 100px; }
  .mic-wave-container { width: 150px; height: 150px; }
  .mic-ring:nth-child(1) { width: 70px; height: 70px; }
  .mic-ring:nth-child(2) { width: 100px; height: 100px; }
  .mic-ring:nth-child(3) { width: 130px; height: 130px; }
  .wave-bars { height: 45px; width: 60px; gap: 3px; }
  .wave-bar { width: 4px; }
  .wave-bar:nth-child(1) { height: 14px; }
  .wave-bar:nth-child(2) { height: 22px; }
  .wave-bar:nth-child(3) { height: 32px; }
  .wave-bar:nth-child(4) { height: 22px; }
  .wave-bar:nth-child(5) { height: 14px; }
  .info-panel { width: 100%; }
}

.sr-only {
  position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
  overflow: hidden; clip: rect(0,0,0,0); border: 0;
}
</style>

<body>

<!-- Toast -->
<div class="toast" id="toastMsg" aria-live="assertive"></div>

<script>
// ==================== BASE DE DONNÉES IOS ====================
const IOS = {
  '061':{id:'061',pri:'h',desc:'Détection boîte chaude',kw:['boite','chaude','surchauffe','échauffement','essieu','roue chaude'],tree:[{t:"Accédez à l'écran Commandes diverses → BOITE CHAUDE.",d:0},{t:"Localisez l'élément et la roue concernée, visitez.",d:0},{t:"Y a-t-il fumée ou forte chaleur ?",d:1,oui:[{t:"Incendie → isolement freins + CHAPITRE 4 SECOURS.",d:0,fin:1}],non:[{t:"Tracez un trait sur les 2 roues, étiquette. Isolez frein (article 3). Vitesse max 30 kilomètres par heure vers garage.",d:0,fin:1}]}]},
  '002':{id:'002',pri:'h',desc:"Défaut majeur relais freinage d'urgence",kw:['freinage','urgence','relais','majeur'],tree:[{t:"🚨 URGENCE — Appliquez immédiatement CHAPITRE 4 — SECOURS.",d:0,fin:1}]},
  '017':{id:'017',pri:'h',desc:'Batteries faibles',kw:['batterie','faible','tension','baisse'],tree:[{t:"Vérifiez BP(F-SE) relevé.",d:0},{t:"L'IOS a-t-il disparu ?",d:1,oui:[{t:"✅ Terminé",d:0,fin:1}],non:[{t:"🚨 Appliquez CHAPITRE 4 SECOURS.",d:0,fin:1}]}]},
  '083':{id:'083',pri:'h',desc:'Perte frein friction bogie CE1',kw:['frein','friction','bogie','ce1','perte'],tree:[{t:"Placez Z(IS)F sur CE1, Z(CO)EV sur ON.",d:0},{t:"Symbole Frein isolé affiché ?",d:1,oui:[{t:"Appliquez page 499, EFAS complet. OK",d:0,fin:1}],non:[{t:"🚨 AVISEZ PC, secours.",d:0,fin:1}]}]},
  '173':{id:'173',pri:'h',desc:'Défaut porte',kw:['porte','portière','défaut','bloquée'],tree:[{t:"Commande centralisée CSL-PUP.",d:0},{t:"L'IOS a disparu ?",d:1,oui:[{t:"✅ Terminé",d:0,fin:1}],non:[{t:"Condamnez la porte (ANNEXE 1).",d:0,fin:1}]}]},
  '111':{id:'111',pri:'h',desc:'Déclenchement FS/FU',kw:['fs','fu','déclenchement','disjoncteur','déclenché'],tree:[{t:"IOS 010 présent ?",d:1,oui:[{t:"SECOURS immédiat",d:0,fin:1}],non:[{t:"Placez Z(ALI-SE) sur SECOURS",d:0},{t:"Disparu ?",d:1,oui:[{t:"✅ OK",d:0,fin:1}],non:[{t:"SECOURS demandé",d:0,fin:1}]}]}]},
  '000':{id:'000',pri:'h',desc:'Boucle sécurité portes',kw:['boucle','sécurité','portes','bloquées'],tree:[{t:"Arrêt 1er quai, aviser PC, appliquer GD.",d:0,fin:1}]}
};
for(let i=0;i<=247;i++){let id=i.toString().padStart(3,'0');if(!IOS[id])IOS[id]={id:id,pri:'l',desc:'Information technique / retour maintenance',tree:[{t:"Avisez le PC, conformez-vous aux instructions.",d:0,fin:1}],kw:[]};}
const ALIAS={'boite chaude':'061','boîte chaude':'061','surchauffe':'061','échauffement essieu':'061','roue chaude':'061','frein friction':'083','bogie ce1':'083','perte frein':'083','batterie faible':'017','batterie':'017','tension basse':'017','urgence':'002','relais freinage':'002','défaut majeur':'002','porte defaut':'173','portière':'173','porte bloquée':'173','fs fu':'111','disjoncteur':'111','déclenchement':'111','boucle sécurité':'000','portes bloquées':'000'};

// ==================== ÉTAT GLOBAL ====================
let currentIOS=null,guideActive=false,guideSteps=[],stepIndex=0,listening=false,speakingFlag=false,micActive=true,recognition=null,recognitionTimeout=null,panelExplicitlyOpened=false;
let procedureStartTime=null,procedureEndTime=null,procedureStepsLog=[];

const synth=window.speechSynthesis,voiceSupport=!!synth;

// DOM
const micWaveContainer=document.getElementById('micWaveContainer'),waveBars=document.getElementById('waveBars');
const statusDot=document.getElementById('statusDot'),statusText=document.getElementById('statusText');
const panel=document.getElementById('infoPanel'),panelOverlay=document.getElementById('panelOverlay'),panelToggle=document.getElementById('panelToggle');
const guideBar=document.getElementById('guideBar'),iosCard=document.getElementById('iosCard'),toastEl=document.getElementById('toastMsg');
const activeIosDisplay=document.getElementById('activeIosDisplay');
const iosListOverlay=document.getElementById('iosListOverlay'),recapOverlay=document.getElementById('recapOverlay');
const endQuestions=document.getElementById('endQuestions');

function toast(msg,d=3000){toastEl.textContent=msg;toastEl.classList.add('show');clearTimeout(toastEl._timeout);toastEl._timeout=setTimeout(()=>toastEl.classList.remove('show'),d);}

function updateUIForState(state){
  micWaveContainer.classList.remove('listening','speaking','error');waveBars.classList.remove('idle','listening','speaking','error');
  switch(state){
    case'listen':micWaveContainer.classList.add('listening');waveBars.classList.add('listening');statusDot.classList.add('active');statusDot.classList.remove('speaking');statusDot.style.background='';statusText.innerText='🎙️ ÉCOUTE ACTIVE ...';break;
    case'speak':micWaveContainer.classList.add('speaking');waveBars.classList.add('speaking');statusDot.classList.add('speaking');statusDot.classList.remove('active');statusDot.style.background='';statusText.innerText='📢 PARLE ...';break;
    case'error':micWaveContainer.classList.add('error');waveBars.classList.add('error');statusDot.classList.remove('active','speaking');statusDot.style.background='';setTimeout(()=>{micWaveContainer.classList.remove('error');waveBars.classList.remove('error');waveBars.classList.add('idle');},500);break;
    default:waveBars.classList.add('idle');statusDot.classList.remove('active','speaking');statusDot.style.background='#475569';statusText.innerText='Micro actif · Dites bonjour';
  }
}

// Panneau
function openPanel(){panel.classList.add('open');panel.setAttribute('aria-hidden','false');panelOverlay.classList.add('active');panelToggle.classList.add('panel-open');panelExplicitlyOpened=true;}
function closePanel(){panel.classList.remove('open');panel.setAttribute('aria-hidden','true');panelOverlay.classList.remove('active');panelToggle.classList.remove('panel-open');panelExplicitlyOpened=false;}
function togglePanel(){panel.classList.contains('open')?closePanel():openPanel();}

// Formatage heure
function formatTime(d){return d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});}
function formatDate(d){return d.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric'});}

// Lecture améliorée
function speakText(txt,callback){
  if(!voiceSupport){if(callback)callback();return;}
  if(speakingFlag)synth.cancel();
  let clean=txt.replace(/[<[\]{}_*#✅🚨]/g,'').replace(/&[a-z]+;/g,'');
  // km/h → kilomètres par heure, art. → article
  clean=clean.replace(/km\/h/gi,'kilomètres par heure').replace(/\bart\.\s*/gi,'article ');
  // Lire les numéros IOS comme un seul nombre
  clean=clean.replace(/IOS\s*(\d)(\d)(\d)/gi,(m,d1,d2,d3)=>{
    let num=parseInt(d1+d2+d3,10);
    return 'IOS '+num;
  });
  // Enlever les zéros devant pour la lecture
  clean=clean.replace(/\b0+(\d+)/g,'$1');
  
  const utter=new SpeechSynthesisUtterance(clean);
  utter.lang='fr-FR';utter.rate=0.9;utter.volume=1;
  const voices=synth.getVoices();const frenchVoice=voices.find(v=>v.lang.startsWith('fr'));
  if(frenchVoice)utter.voice=frenchVoice;
  speakingFlag=true;updateUIForState('speak');
  utter.onend=()=>{speakingFlag=false;updateUIForState('idle');if(micActive&&!listening)startListening();if(callback)callback();};
  utter.onerror=()=>{speakingFlag=false;updateUIForState('error');if(micActive&&!listening)startListening();if(callback)callback();};
  synth.speak(utter);
}

// Messages chat
function addMessage(text,role){
  const container=document.getElementById('chatMsgs');
  const div=document.createElement('div');div.className=`message ${role}`;div.innerHTML=`<div class="bubble">${text}</div>`;
  container.appendChild(div);container.scrollTop=container.scrollHeight;
  while(container.children.length>50)container.removeChild(container.firstChild);
}

// Affichage IOS sur écran principal
function updateActiveIosDisplay(ios,stepInfo=null){
  if(!ios){activeIosDisplay.classList.remove('show');return;}
  activeIosDisplay.classList.add('show');
  document.getElementById('activeIosId').textContent=`IOS-${ios.id}`;
  document.getElementById('activeIosDesc').textContent=ios.desc;
  let pc=ios.pri==='h'?'prio-h':(ios.pri==='m'?'prio-m':'prio-l');
  let pt=ios.pri==='h'?'⚠️ URGENCE':(ios.pri==='m'?'● MOYEN':'ℹ️ INFO');
  let pEl=document.getElementById('activeIosPrio');pEl.textContent=pt;pEl.className=`prio-badge ${pc}`;
  document.getElementById('activeIosSteps').textContent=`📋 ${ios.tree.length} étapes`;
  document.getElementById('activeIosStatus').textContent=stepInfo||'';
}

// Recherche IOS
function findIOSByQuery(query){
  let q=query.toLowerCase().trim();
  let match=q.match(/(?:ios\s*)?(\d{3}|\d{1,3})/i);
  if(match){let id=match[1].padStart(3,'0');if(IOS[id])return IOS[id];}
  for(let[alias,id]of Object.entries(ALIAS)){if(q.includes(alias))return IOS[id];}
  for(let ios of Object.values(IOS)){if(ios.desc.toLowerCase().includes(q))return ios;if(ios.kw&&ios.kw.some(k=>q.includes(k)))return ios;}
  if(q.length>=3){for(let ios of Object.values(IOS)){if(ios.desc.toLowerCase().includes(q.substring(0,3)))return ios;if(ios.kw&&ios.kw.some(k=>k.includes(q.substring(0,3))))return ios;}}
  return null;
}

function showIOSDetails(ios){
  currentIOS=ios;guideActive=false;guideBar.classList.remove('active');iosCard.classList.add('show');
  document.getElementById('iosId').innerHTML=`IOS-${ios.id}`;document.getElementById('iosDesc').innerText=ios.desc;
  let pc=ios.pri==='h'?'prio-h':(ios.pri==='m'?'prio-m':'prio-l');
  let pt=ios.pri==='h'?'⚠️ URGENCE':(ios.pri==='m'?'● MOYEN':'ℹ️ INFO');
  document.getElementById('iosPrio').innerHTML=pt;document.getElementById('iosPrio').className=`prio-badge ${pc}`;
  let bodyHtml=`<div style="font-family:monospace;font-size:0.75rem;">📋 ${ios.tree.length} étapes de guidage disponibles.</div>`;
  if(ios.pri==='h')bodyHtml+='<div style="color:#ef4444;margin-top:10px;font-weight:600;">⚠️ Procédure d\'urgence</div>';
  bodyHtml+='<div style="margin-top:10px;font-size:0.8rem;color:#94a3b8;">💡 Dites <b>"démarrer le guidage"</b> ou cliquez sur <b>GUIDAGE</b>.</div>';
  document.getElementById('iosBody').innerHTML=bodyHtml;
  addMessage(`🔍 <strong>IOS ${ios.id}</strong> — ${ios.desc}. Dites "démarrer le guidage".`,'ai');
  speakText(`IOS ${parseInt(ios.id,10)}. ${ios.desc.substring(0,80)}. Dites démarrer le guidage.`);
  updateActiveIosDisplay(ios);
  procedureStartTime=null;procedureEndTime=null;procedureStepsLog=[];
}

// Liste des IOS
function buildIosList(){
  const scroll=document.getElementById('iosListScroll');scroll.innerHTML='';
  const ids=Object.keys(IOS).sort((a,b)=>parseInt(a)-parseInt(b));
  for(let id of ids){
    const ios=IOS[id];
    const div=document.createElement('div');div.className='ios-list-item';
    const pc=ios.pri==='h'?'h':(ios.pri==='m'?'m':'l');
    const pt=ios.pri==='h'?'URG':(ios.pri==='m'?'MOY':'INF');
    div.innerHTML=`<span class="ios-list-num">IOS-${ios.id}</span><span class="ios-list-desc">${ios.desc}</span><span class="ios-list-prio ${pc}">${pt}</span>`;
    div.addEventListener('click',()=>{
      closeIosList();showIOSDetails(ios);
    });
    scroll.appendChild(div);
  }
}
function openIosList(){buildIosList();iosListOverlay.classList.add('active');}
function closeIosList(){iosListOverlay.classList.remove('active');}

// Récapitulatif
function generateRecap(){
  if(!currentIOS||!procedureStartTime)return'';
  let end=procedureEndTime||new Date();
  let recap=`═══════════════════════════════════
  BULLETIN DE SERVICE - IAOS T4
═══════════════════════════════════

📅 Date : ${formatDate(procedureStartTime)}

🔧 IOS : ${currentIOS.id}
📝 Description : ${currentIOS.desc}
⚠️ Priorité : ${currentIOS.pri==='h'?'URGENCE':(currentIOS.pri==='m'?'MOYEN':'INFO')}

⏱️ Heure de début : ${formatTime(procedureStartTime)}
⏱️ Heure de fin   : ${formatTime(end)}
⏱️ Durée totale   : ${Math.round((end-procedureStartTime)/60000)} minutes

📋 Étapes effectuées :
${procedureStepsLog.map((s,i)=>`   ${i+1}. ${s}`).join('\n')}

✅ Statut : Procédure terminée
`;
  return recap;
}
function showRecap(){
  const content=document.getElementById('recapContent');
  content.textContent=generateRecap();
  recapOverlay.classList.add('active');
}
function closeRecap(){recapOverlay.classList.remove('active');}
function printRecap(){
  const content=document.getElementById('recapContent').textContent;
  const win=window.open('','','width=700,height=600');
  win.document.write(`<pre style="font-family:monospace;font-size:12px;padding:20px;color:black;background:white;">${content}</pre>`);
  win.document.close();win.print();
}

// Questions fin de procédure
function showEndQuestions(){
  endQuestions.classList.add('active');
}
function hideEndQuestions(){
  endQuestions.classList.remove('active');
}

// Guidage
function startGuidage(){
  if(!currentIOS){addMessage("Aucun IOS actif.",'ai');speakText("Aucun IOS sélectionné.");return;}
  if(guideActive){addMessage("Guidage déjà en cours.",'ai');return;}
  guideActive=true;guideSteps=[...currentIOS.tree];stepIndex=0;
  procedureStartTime=new Date();procedureEndTime=null;procedureStepsLog=[];
  guideBar.classList.add('active');hideEndQuestions();
  updateActiveIosDisplay(currentIOS,'🟢 En cours');
  renderStep();
  addMessage("🚀 <strong>Guidage lancé</strong> pour IOS "+currentIOS.id,'ai');
}
function renderStep(){
  if(!guideActive||stepIndex>=guideSteps.length){finishProcedure("✅ Fin de la procédure.");return;}
  let step=guideSteps[stepIndex];
  if(step.fin){finishProcedure(step.t||"Procédure achevée.");return;}
  document.getElementById('guideStepLabel').innerHTML=`ÉTAPE ${stepIndex+1}/${guideSteps.length} · IOS ${currentIOS.id}`;
  document.getElementById('guideText').innerHTML=step.t;
  document.getElementById('yesBtn').style.display=step.d?'inline-flex':'none';
  document.getElementById('noBtn').style.display=step.d?'inline-flex':'none';
  addMessage(`📌 Étape ${stepIndex+1}: ${step.t}`,'ai');
  procedureStepsLog.push(step.t);
  speakText(step.t);
  updateActiveIosDisplay(currentIOS,`Étape ${stepIndex+1}/${guideSteps.length}`);
}
function answerYes(){if(guideActive&&guideSteps[stepIndex]&&guideSteps[stepIndex].d)processAnswer(true);}
function answerNo(){if(guideActive&&guideSteps[stepIndex]&&guideSteps[stepIndex].d)processAnswer(false);}
function processAnswer(yes){
  let step=guideSteps[stepIndex];let next=yes?(step.oui||[]):(step.non||[]);
  addMessage(yes?"✓ OUI":"✗ NON",'user');
  procedureStepsLog.push(yes?"Réponse: OUI":"Réponse: NON");
  if(next.length===0){finishProcedure("✅ Fin de la procédure.");return;}
  guideSteps=next;stepIndex=0;renderStep();
}
function nextStepAction(){
  if(!guideActive)return;
  let step=guideSteps[stepIndex];
  if(step&&step.d){speakText("Veuillez répondre par oui ou par non.");addMessage("⚠️ Cette étape nécessite oui/non.",'ai');return;}
  stepIndex++;renderStep();
}
function prevStepAction(){if(guideActive&&stepIndex>0){stepIndex--;renderStep();}else{speakText("Première étape.");}}
function finishProcedure(msg){
  guideActive=false;procedureEndTime=new Date();guideBar.classList.remove('active');
  addMessage(msg,'ai');speakText("Fin de la procédure. "+msg.replace(/[✅🚨]/g,''));
  if(currentIOS){addMessage(`🏁 Diagnostic terminé pour IOS ${currentIOS.id}.`,'ai');}
  updateActiveIosDisplay(currentIOS,'✅ Terminé');
  showEndQuestions();
}
function cancelProcedure(){
  guideActive=false;guideBar.classList.remove('active');hideEndQuestions();
  addMessage("❌ Procédure annulée.",'ai');speakText("Procédure annulée.");
  updateActiveIosDisplay(currentIOS,'❌ Annulé');
}
function homeReset(){
  cancelProcedure();currentIOS=null;iosCard.classList.remove('show');
  document.getElementById('searchInput').value='';
  updateActiveIosDisplay(null);
  addMessage("🏠 Retour accueil.",'ai');speakText("Retour à l'accueil.");
}

// Commandes vocales
const COMMAND_PATTERNS={
  salutation:[/\b(?:bonjour|salut|salam|salem|coucou|hello|hi|hey|bonsoir|salamou? al[ae]ykoum?|salamou? aleikoum?|wesh|yo)\b/i],
  heure:[/\b(?:quelle heure|il est quelle heure|donne l'heure|heure actuelle|heure|montre l'heure|dis l'heure)\b/i],
  date:[/\b(?:quelle date|on est quel jour|donne la date|date aujourd'hui|date|quel jour|affiche la date)\b/i],
  liste_ios:[/\b(?:liste des ios|tous les ios|affiche la liste|montre les ios|liste complète|voir tous les ios|liste ios)\b/i],
  demarrer:[/\b(?:démarrer|démarre|commencer|lance|guidage|guide|start|go|on y va|c'est parti|exécute|procédure)\b/i],
  suivant:[/\b(?:suivant|passe à la suite|étape suivante|après|ensuite|prochaine|la suite|continuer|continue|j'ai fini|c'est fait|ok|c'est bon|d'accord|ok suivant|next|j'ai terminé|terminé|effectué)\b/i],
  precedent:[/\b(?:précédent|reviens|retour|en arrière|recule|back|étape d'avant|remonte|erreur)\b/i],
  oui:[/\b(?:oui|ouais|yes|yep|affirmatif|exact|correct|bien sûr|tout à fait|absolument|confirmé|validé|présent|allumé|fonctionne|ça marche|actif)\b/i],
  non:[/\b(?:non|no|nope|nan|négatif|pas du tout|faux|incorrect|disparu|absent|éteint|pas affiché|aucun|rien|néant|marche pas|désactivé|inactif)\b/i],
  annuler:[/\b(?:annuler|stop|arrête|interrompt|abandonne|abort|cancel|termine|quitte|j'arrête)\b/i],
  accueil:[/\b(?:accueil|menu|retour accueil|home|reset|recommencer)\b/i],
  repeter:[/\b(?:répète|redis|encore|répète ça|what|say again|repeat|quoi|pardon|hein|j'ai pas compris|peux-tu répéter|reformule)\b/i],
  aide:[/\b(?:aide|help|commandes|options|quoi dire|comment faire|liste des commandes)\b/i]
};
function isCommandMatch(text,type){const p=COMMAND_PATTERNS[type];return p?p.some(r=>r.test(text)):false;}

function processVoiceCommand(txt){
  let lower=txt.toLowerCase().trim();
  addMessage(`🎤 "${txt}"`,'user');

  // Salutations
  if(isCommandMatch(lower,'salutation')){
    if(/\b(?:salam|salem|salamou)\s*(?:al[ae]ykoum?|aleikoum?)/i.test(lower)){
      addMessage("👋 Wa aleykoum salam. IAOS T4 à votre service.",'ai');
      speakText("Wa aleykoum salam. IAOS T4 à votre service.");return;
    }
    const g=["Bonjour ! IAOS T4 à votre service. Dites un numéro IOS.","Salut ! Prêt à vous assister.","Bonjour. Dites-moi quel code IOS vous concerne."];
    addMessage(`👋 ${g[0]}`,'ai');speakText(g[Math.floor(Math.random()*g.length)]);return;
  }

  // Heure
  if(isCommandMatch(lower,'heure')){
    const now=new Date();const h=formatTime(now);
    addMessage(`🕐 Il est ${h}.`,'ai');speakText(`Il est ${h}.`);return;
  }

  // Date
  if(isCommandMatch(lower,'date')){
    const now=new Date();const d=formatDate(now);
    addMessage(`📅 Nous sommes le ${d}.`,'ai');speakText(`Nous sommes le ${d}.`);return;
  }

  // Liste IOS
  if(isCommandMatch(lower,'liste_ios')){openIosList();addMessage("📋 Affichage de la liste des IOS.",'ai');speakText("Voici la liste de tous les IOS.");return;}

  if(isCommandMatch(lower,'aide')){
    addMessage("💡 Commandes: démarrer, suivant, précédent, oui, non, annuler, accueil, répète, heure, date, liste des ios.",'ai');
    speakText("Commandes disponibles: démarrer, suivant, précédent, oui, non, annuler, accueil, répète, heure, date, liste des ios.");return;
  }
  if(isCommandMatch(lower,'annuler')){cancelProcedure();return;}
  if(isCommandMatch(lower,'accueil')){homeReset();return;}
  if(isCommandMatch(lower,'demarrer')){
    if(currentIOS&&!guideActive)startGuidage();
    else if(guideActive)addMessage("Guidage déjà en cours.",'ai');
    else{addMessage("Aucun IOS sélectionné.",'ai');speakText("Cherchez d'abord un IOS.");}
    return;
  }
  if(isCommandMatch(lower,'oui')&&!isCommandMatch(lower,'non')){
    if(guideActive&&guideSteps[stepIndex]&&guideSteps[stepIndex].d)answerYes();
    else addMessage("Pas de question en attente.",'ai');
    return;
  }
  if(isCommandMatch(lower,'non')){
    if(guideActive&&guideSteps[stepIndex]&&guideSteps[stepIndex].d)answerNo();
    else addMessage("Pas de question en attente.",'ai');
    return;
  }
  if(isCommandMatch(lower,'suivant')&&!isCommandMatch(lower,'non')&&!isCommandMatch(lower,'precedent')){
    if(guideActive)nextStepAction();else addMessage("Aucun guidage actif.",'ai');
    return;
  }
  if(isCommandMatch(lower,'precedent')){if(guideActive)prevStepAction();return;}
  if(isCommandMatch(lower,'repeter')){
    if(guideActive&&guideSteps[stepIndex])speakText(guideSteps[stepIndex].t);
    else if(currentIOS)speakText(currentIOS.desc);
    else speakText("Aucune information.");
    return;
  }
  let iosFound=findIOSByQuery(lower);
  if(iosFound)showIOSDetails(iosFound);
  else{addMessage(`Aucun résultat.`,'ai');speakText("Aucun IOS trouvé.");}
}

// Reconnaissance vocale
function startListening(){
  if(!('SpeechRecognition'in window)&&!('webkitSpeechRecognition'in window)){toast("Reconnaissance non supportée");return;}
  if(speakingFlag||listening)return;
  try{
    let SR=window.SpeechRecognition||window.webkitSpeechRecognition;recognition=new SR();
    recognition.lang='fr-FR';recognition.continuous=false;recognition.interimResults=false;recognition.maxAlternatives=3;
    recognition.onstart=()=>{listening=true;updateUIForState('listen');};
    recognition.onresult=(e)=>{
      let best='',bestC=0;
      for(let i=0;i<e.results[0].length;i++){if(e.results[0][i].confidence>bestC){bestC=e.results[0][i].confidence;best=e.results[0][i].transcript;}}
      if(bestC<0.2){addMessage("Je n'ai pas compris.",'ai');speakText("Je n'ai pas compris.");return;}
      processVoiceCommand(best);
    };
    recognition.onerror=(e)=>{
      listening=false;
      if(e.error==='no-speech'){}
      else if(e.error==='audio-capture'){toast("Micro non disponible");micActive=false;}
      else if(e.error==='not-allowed'){toast("Permission micro refusée");micActive=false;}
      updateUIForState('idle');
      if(micActive&&!speakingFlag){clearTimeout(recognitionTimeout);recognitionTimeout=setTimeout(startListening,800);}
    };
    recognition.onend=()=>{
      listening=false;
      if(micActive&&!speakingFlag){clearTimeout(recognitionTimeout);recognitionTimeout=setTimeout(startListening,500);}
      else updateUIForState('idle');
    };
    recognition.start();
  }catch(e){if(micActive){clearTimeout(recognitionTimeout);recognitionTimeout=setTimeout(startListening,1000);}}
}
function stopListening(){if(recognition){try{recognition.stop();}catch(e){}recognition=null;}clearTimeout(recognitionTimeout);listening=false;updateUIForState('idle');}

// Événements
document.getElementById('micWaveContainer').addEventListener('click',()=>{
  if(speakingFlag){synth.cancel();speakingFlag=false;updateUIForState('idle');return;}
  micActive=!micActive;
  if(micActive){startListening();statusDot.style.background='';statusText.innerText='Micro actif · Dites bonjour';}
  else{stopListening();statusText.innerText='Micro en pause';statusDot.style.background='#ef4444';statusDot.classList.remove('active','speaking');}
});
document.getElementById('micWaveContainer').addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();document.getElementById('micWaveContainer').click();}});
panelToggle.addEventListener('click',togglePanel);
panelOverlay.addEventListener('click',closePanel);
document.getElementById('closePanel').addEventListener('click',closePanel);
document.addEventListener('keydown',e=>{if(e.key==='Escape'){if(recapOverlay.classList.contains('active'))closeRecap();else if(iosListOverlay.classList.contains('active'))closeIosList();else if(panel.classList.contains('open'))closePanel();}});
document.getElementById('searchBtn').addEventListener('click',()=>{let v=document.getElementById('searchInput').value;if(v){processVoiceCommand(v);document.getElementById('searchInput').value='';}});
document.getElementById('searchInput').addEventListener('keypress',e=>{if(e.key==='Enter'){let v=e.target.value;if(v){processVoiceCommand(v);e.target.value='';}}});
document.getElementById('showAllIosBtn').addEventListener('click',openIosList);
document.getElementById('iosListClose').addEventListener('click',closeIosList);
iosListOverlay.addEventListener('click',e=>{if(e.target===iosListOverlay)closeIosList();});
document.getElementById('recapClose').addEventListener('click',closeRecap);
document.getElementById('recapCloseBtn').addEventListener('click',closeRecap);
document.getElementById('recapPrintBtn').addEventListener('click',printRecap);
recapOverlay.addEventListener('click',e=>{if(e.target===recapOverlay)closeRecap();});
document.getElementById('guideStartBtn').addEventListener('click',startGuidage);
document.getElementById('cancelGuideBtn').addEventListener('click',cancelProcedure);
document.getElementById('homeBtn').addEventListener('click',homeReset);
document.getElementById('newSearchBtn').addEventListener('click',homeReset);
document.getElementById('yesBtn').addEventListener('click',answerYes);
document.getElementById('noBtn').addEventListener('click',answerNo);
document.getElementById('nextStepBtn').addEventListener('click',nextStepAction);
document.getElementById('prevStepBtn').addEventListener('click',prevStepAction);
document.getElementById('cancelGuideBtn2').addEventListener('click',cancelProcedure);
document.getElementById('endRecapYes').addEventListener('click',()=>{hideEndQuestions();showRecap();});
document.getElementById('endRecapNo').addEventListener('click',hideEndQuestions);

// Cycle de vie
document.addEventListener('visibilitychange',()=>{
  if(document.hidden){if(listening)stopListening();if(speakingFlag)synth.cancel();}
  else{if(micActive&&!speakingFlag)startListening();}
});

// Swipe panneau
let tsX=0,tsY=0,tMoved=false;
panel.addEventListener('touchstart',e=>{tsX=e.touches[0].clientX;tsY=e.touches[0].clientY;tMoved=false;},{passive:true});
panel.addEventListener('touchmove',e=>{
  let cx=e.touches[0].clientX,cy=e.touches[0].clientY,dx=cx-tsX,dy=Math.abs(cy-tsY);
  if(dx>30&&dx>dy){tMoved=true;panel.style.transform=`translateX(${dx}px)`;panel.style.transition='none';}
},{passive:true});
panel.addEventListener('touchend',e=>{
  panel.style.transition='';
  if(tMoved){let ex=e.changedTouches[0].clientX;if(ex-tsX>80)closePanel();else panel.style.transform='';}
});

// Init
function initMic(){micActive=true;updateUIForState('idle');startListening();}
initMic();
console.log('✅ IAOS T4 initialisé');
</script>
