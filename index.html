<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>IAOS T4 · DUALIS U53700 · Assistant Holographique</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

:root {
  --bg-dark: #010208;
  --bg-panel: rgba(2, 5, 15, 0.96);
  --cyan: #0ff;
  --purple: #c084fc;
  --green: #22c55e;
  --red: #ef4444;
  --amber: #f59e0b;
  --text: #e2e8f0;
  --text-dim: #7f8ea3;
}

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg-dark);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
}

/* Fond simple et performant */
.holo-bg {
  position: fixed;
  inset: 0;
  background: 
    radial-gradient(circle at 15% 25%, rgba(0, 200, 255, 0.04), transparent 50%),
    radial-gradient(circle at 85% 70%, rgba(180, 100, 255, 0.03), transparent 50%);
  pointer-events: none;
  z-index: 0;
}

/* Conteneur principal */
.main-container {
  position: relative;
  z-index: 2;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 1.5rem;
  gap: 2.5rem;
}

/* Titre */
.title-wrap {
  text-align: center;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  padding: 0.6rem 2rem;
  border-radius: 80px;
  background: rgba(0, 20, 40, 0.35);
  border: 1px solid rgba(0, 255, 255, 0.15);
}

.hero {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: clamp(2.5rem, 8vw, 4.2rem);
  background: linear-gradient(135deg, #ffffff, #00ffff, #c084fc, #00ffff);
  background-size: 300% 300%;
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  letter-spacing: -0.02em;
  animation: titleShimmer 4s ease-in-out infinite;
}

@keyframes titleShimmer {
  0%, 100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}

.hero-sub {
  font-family: 'Space Mono', monospace;
  font-size: 0.6rem;
  letter-spacing: 4px;
  color: var(--cyan);
  text-shadow: 0 0 8px cyan, 0 0 16px rgba(0, 255, 255, 0.5);
}

/* Micro */
.holo-mic-container {
  position: relative;
  width: 200px;
  height: 200px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.holo-mic {
  position: relative;
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: transform 0.2s ease;
}

.holo-mic:active {
  transform: scale(0.95);
}

.mic-holo-ring {
  position: absolute;
  border-radius: 50%;
  border: 1.5px solid rgba(0, 255, 255, 0.35);
  animation: pulseRing 2.8s infinite ease-in-out;
}

.ring1 { width: 95px; height: 95px; animation-delay: 0s; }
.ring2 { width: 135px; height: 135px; animation-delay: 0.5s; }
.ring3 { width: 175px; height: 175px; animation-delay: 1s; }

@keyframes pulseRing {
  0% { transform: scale(0.93); opacity: 0.5; border-color: rgba(0, 255, 255, 0.4); }
  50% { transform: scale(1.04); opacity: 1; border-color: rgba(0, 255, 255, 0.9); box-shadow: 0 0 18px rgba(0, 255, 255, 0.4); }
  100% { transform: scale(0.93); opacity: 0.5; border-color: rgba(0, 255, 255, 0.4); }
}

.mic-core {
  width: 80px;
  height: 80px;
  background: radial-gradient(circle at 35% 35%, rgba(0, 255, 255, 0.2), rgba(0, 80, 120, 0.4));
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 2.5rem;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border: 1.5px solid rgba(0, 255, 255, 0.6);
  box-shadow: 0 0 25px rgba(0, 255, 255, 0.4);
  transition: all 0.25s ease;
  z-index: 5;
  position: relative;
}

.mic-core.listening {
  border-color: var(--green);
  box-shadow: 0 0 35px rgba(34, 197, 94, 0.6), 0 0 60px rgba(34, 197, 94, 0.2);
  animation: micPulseListening 0.9s infinite;
  background: radial-gradient(circle at 35% 35%, rgba(34, 197, 94, 0.25), rgba(0, 120, 60, 0.4));
}

@keyframes micPulseListening {
  0% { box-shadow: 0 0 25px rgba(34, 197, 94, 0.5); transform: scale(1); }
  50% { box-shadow: 0 0 45px rgba(34, 197, 94, 0.8); transform: scale(1.03); }
  100% { box-shadow: 0 0 25px rgba(34, 197, 94, 0.5); transform: scale(1); }
}

.mic-core.speaking {
  border-color: var(--purple);
  box-shadow: 0 0 35px rgba(192, 132, 252, 0.6), 0 0 60px rgba(192, 132, 252, 0.2);
  animation: micPulseSpeaking 0.7s infinite;
  background: radial-gradient(circle at 35% 35%, rgba(192, 132, 252, 0.25), rgba(100, 60, 180, 0.4));
}

@keyframes micPulseSpeaking {
  0% { box-shadow: 0 0 25px rgba(192, 132, 252, 0.5); transform: scale(1); }
  50% { box-shadow: 0 0 50px rgba(192, 132, 252, 0.8); transform: scale(1.03); }
  100% { box-shadow: 0 0 25px rgba(192, 132, 252, 0.5); transform: scale(1); }
}

.mic-core.error {
  border-color: var(--red);
  box-shadow: 0 0 25px rgba(239, 68, 68, 0.5);
  animation: errorShake 0.4s;
}

@keyframes errorShake {
  0%, 100% { transform: translateX(0); }
  20% { transform: translateX(-5px); }
  40% { transform: translateX(5px); }
  60% { transform: translateX(-3px); }
  80% { transform: translateX(3px); }
}

/* Barre de statut */
.status-pill {
  display: flex;
  gap: 12px;
  align-items: center;
  background: rgba(0, 10, 25, 0.7);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border: 1px solid rgba(0, 255, 255, 0.3);
  border-radius: 60px;
  padding: 10px 26px;
  font-size: 0.8rem;
  font-family: 'Space Mono', monospace;
}

.status-dot {
  width: 9px;
  height: 9px;
  border-radius: 50%;
  background: #475569;
  transition: all 0.3s ease;
  flex-shrink: 0;
}

.status-dot.active {
  background: var(--green);
  box-shadow: 0 0 10px var(--green);
}

.status-dot.speaking {
  background: var(--purple);
  box-shadow: 0 0 10px var(--purple);
}

.wave {
  display: flex;
  gap: 4px;
  align-items: center;
  height: 20px;
}

.wave span {
  width: 3px;
  background: var(--cyan);
  border-radius: 2px;
  animation: waveAnim 0.7s infinite alternate;
}

.wave span:nth-child(1) { height: 8px; animation-delay: 0s; }
.wave span:nth-child(2) { height: 14px; animation-delay: 0.12s; }
.wave span:nth-child(3) { height: 20px; animation-delay: 0.24s; }
.wave span:nth-child(4) { height: 12px; animation-delay: 0.36s; }

@keyframes waveAnim {
  from { transform: scaleY(0.3); opacity: 0.4; }
  to { transform: scaleY(1); opacity: 1; }
}

/* Overlay du panneau */
.panel-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.5);
  z-index: 98;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
}

.panel-overlay.active {
  opacity: 1;
  pointer-events: auto;
}

/* Panneau d'information (caché par défaut) */
.info-panel {
  position: fixed;
  top: 0;
  right: 0;
  width: min(94%, 450px);
  height: 100%;
  background: var(--bg-panel);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-left: 1px solid rgba(0, 255, 255, 0.35);
  z-index: 100;
  transform: translateX(105%);
  transition: transform 0.35s cubic-bezier(0.22, 0.61, 0.36, 1);
  display: flex;
  flex-direction: column;
  box-shadow: -8px 0 40px rgba(0, 0, 0, 0.6);
  will-change: transform;
}

.info-panel.open {
  transform: translateX(0);
}

.panel-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 18px 20px;
  border-bottom: 1px solid rgba(0, 255, 255, 0.2);
  background: rgba(0, 0, 0, 0.4);
}

.panel-header h3 {
  font-family: 'Space Mono', monospace;
  font-size: 0.7rem;
  letter-spacing: 3px;
  color: var(--cyan);
  text-shadow: 0 0 6px rgba(0, 255, 255, 0.5);
}

.close-panel {
  background: rgba(0, 0, 0, 0.3);
  border: 1px solid rgba(0, 255, 255, 0.3);
  color: var(--text-dim);
  width: 34px;
  height: 34px;
  border-radius: 10px;
  cursor: pointer;
  font-size: 1rem;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}

.close-panel:hover {
  background: rgba(239, 68, 68, 0.2);
  border-color: var(--red);
  color: var(--red);
}

.panel-content {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 18px;
}

.panel-content::-webkit-scrollbar {
  width: 5px;
}

.panel-content::-webkit-scrollbar-track {
  background: transparent;
}

.panel-content::-webkit-scrollbar-thumb {
  background: rgba(0, 255, 255, 0.2);
  border-radius: 3px;
}

/* Bouton toggle du panneau avec engrenage */
.panel-toggle {
  position: fixed;
  bottom: 28px;
  right: 28px;
  width: 56px;
  height: 56px;
  border-radius: 30px;
  background: rgba(0, 20, 40, 0.9);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1.5px solid rgba(0, 255, 255, 0.5);
  color: var(--cyan);
  font-size: 1.6rem;
  cursor: pointer;
  z-index: 102;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.3s ease;
  box-shadow: 0 0 18px rgba(0, 255, 255, 0.25), 0 4px 18px rgba(0, 0, 0, 0.5);
  overflow: hidden;
}

.panel-toggle:hover {
  transform: scale(1.06);
  box-shadow: 0 0 28px rgba(0, 255, 255, 0.4), 0 6px 22px rgba(0, 0, 0, 0.6);
}

.panel-toggle:active {
  transform: scale(0.94);
}

/* Animation de rotation de l'engrenage */
.panel-toggle .gear-icon {
  display: inline-block;
  transition: transform 0.5s ease;
}

.panel-toggle:hover .gear-icon {
  transform: rotate(90deg);
}

.panel-toggle.panel-open .gear-icon {
  transform: rotate(180deg);
}

/* Zone de recherche */
.search-box {
  background: rgba(0, 15, 30, 0.7);
  border: 1px solid rgba(0, 255, 255, 0.25);
  border-radius: 50px;
  display: flex;
  align-items: center;
  padding: 5px 6px 5px 20px;
  gap: 10px;
}

.search-box input {
  flex: 1;
  background: none;
  border: none;
  outline: none;
  color: var(--text);
  font-size: 0.9rem;
  padding: 12px 0;
  font-family: 'DM Sans', sans-serif;
}

.search-box input::placeholder {
  color: var(--text-dim);
}

.search-box button {
  background: rgba(0, 255, 255, 0.15);
  border: 1px solid rgba(0, 255, 255, 0.3);
  padding: 9px 20px;
  border-radius: 40px;
  color: var(--cyan);
  cursor: pointer;
  font-family: 'Space Mono', monospace;
  font-size: 0.75rem;
  transition: all 0.2s;
  white-space: nowrap;
}

.search-box button:hover {
  background: rgba(0, 255, 255, 0.3);
}

/* Carte de détail IOS */
.ios-detail-card {
  background: rgba(5, 12, 25, 0.8);
  border: 1px solid rgba(0, 255, 255, 0.3);
  border-radius: 22px;
  overflow: hidden;
  display: none;
  animation: fadeUp 0.3s ease;
}

.ios-detail-card.show {
  display: block;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

.card-header {
  padding: 18px;
  border-bottom: 1px solid rgba(0, 255, 255, 0.2);
}

.ios-code {
  font-family: 'Space Mono', monospace;
  font-size: 1.3rem;
  font-weight: 700;
  display: flex;
  gap: 10px;
  align-items: baseline;
  flex-wrap: wrap;
  color: #fff;
}

.prio-badge {
  font-size: 0.6rem;
  padding: 4px 10px;
  border-radius: 20px;
  display: inline-block;
  margin-top: 6px;
  font-family: 'Space Mono', monospace;
  letter-spacing: 1px;
}

.prio-h { 
  background: rgba(239, 68, 68, 0.2); 
  color: #f87171; 
  border: 1px solid rgba(239, 68, 68, 0.4);
  animation: prioUrgentPulse 1.5s infinite;
}

@keyframes prioUrgentPulse {
  0%, 100% { box-shadow: 0 0 5px rgba(239, 68, 68, 0.3); }
  50% { box-shadow: 0 0 15px rgba(239, 68, 68, 0.6); }
}

.prio-m { 
  background: rgba(245, 158, 11, 0.2); 
  color: #fbbf24; 
  border: 1px solid rgba(245, 158, 11, 0.4);
}

.prio-l { 
  background: rgba(34, 197, 94, 0.2); 
  color: #4ade80; 
  border: 1px solid rgba(34, 197, 94, 0.4);
}

.card-actions {
  padding: 14px 18px;
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  border-bottom: 1px solid rgba(0, 255, 255, 0.1);
}

.action-btn {
  background: rgba(0, 255, 255, 0.06);
  border: 1px solid rgba(0, 255, 255, 0.25);
  padding: 7px 16px;
  border-radius: 30px;
  color: var(--cyan);
  font-size: 0.75rem;
  cursor: pointer;
  transition: all 0.2s;
  font-family: 'DM Sans', sans-serif;
  white-space: nowrap;
}

.action-btn:hover {
  background: rgba(0, 255, 255, 0.18);
  transform: translateY(-1px);
}

.action-btn:active {
  transform: translateY(0);
}

.action-btn.green { 
  background: rgba(34, 197, 94, 0.12); 
  border-color: rgba(34, 197, 94, 0.5); 
  color: #22c55e; 
}

.action-btn.green:hover {
  background: rgba(34, 197, 94, 0.25);
  box-shadow: 0 0 15px rgba(34, 197, 94, 0.25);
}

.action-btn.red { 
  background: rgba(239, 68, 68, 0.08); 
  border-color: rgba(239, 68, 68, 0.4); 
  color: #ef4444; 
}

.action-btn.red:hover {
  background: rgba(239, 68, 68, 0.2);
  box-shadow: 0 0 15px rgba(239, 68, 68, 0.25);
}

.card-body {
  padding: 18px;
  font-size: 0.85rem;
  color: var(--text-dim);
  line-height: 1.6;
}

/* Zone de chat */
.chat-area {
  background: rgba(0, 10, 22, 0.6);
  border-radius: 20px;
  border: 1px solid rgba(0, 255, 255, 0.2);
  overflow: hidden;
}

.chat-messages {
  height: 240px;
  overflow-y: auto;
  padding: 14px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.chat-messages::-webkit-scrollbar {
  width: 4px;
}

.chat-messages::-webkit-scrollbar-track {
  background: transparent;
}

.chat-messages::-webkit-scrollbar-thumb {
  background: rgba(0, 255, 255, 0.25);
  border-radius: 2px;
}

.message {
  display: flex;
  gap: 8px;
  max-width: 88%;
  animation: messageIn 0.25s ease;
}

@keyframes messageIn {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

.message.user { 
  align-self: flex-end; 
  flex-direction: row-reverse; 
}

.message.ai .bubble { 
  background: rgba(0, 120, 200, 0.15); 
  border-radius: 6px 16px 16px 16px; 
  border: 1px solid rgba(0, 255, 255, 0.2);
}

.message.user .bubble { 
  background: rgba(124, 58, 237, 0.15); 
  border-radius: 16px 6px 16px 16px; 
  border: 1px solid rgba(168, 85, 247, 0.4);
}

.bubble {
  padding: 10px 14px;
  font-size: 0.82rem;
  line-height: 1.5;
  word-break: break-word;
}

/* Barre de guidage */
.guide-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  background: rgba(1, 3, 12, 0.97);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid rgba(0, 255, 255, 0.4);
  padding: 16px 22px;
  z-index: 90;
  transform: translateY(100%);
  transition: transform 0.35s cubic-bezier(0.22, 0.61, 0.36, 1);
  box-shadow: 0 -6px 30px rgba(0, 0, 0, 0.5);
  will-change: transform;
}

.guide-bar.active {
  transform: translateY(0);
}

.guide-step {
  font-family: 'Space Mono', monospace;
  font-size: 0.65rem;
  color: var(--green);
  letter-spacing: 2px;
  text-shadow: 0 0 6px rgba(34, 197, 94, 0.4);
}

.guide-text {
  font-size: 0.95rem;
  margin: 10px 0;
  line-height: 1.5;
  font-weight: 500;
}

.guide-buttons {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.guide-btn {
  background: rgba(0, 30, 50, 0.8);
  border: 1px solid rgba(0, 255, 255, 0.3);
  padding: 8px 18px;
  border-radius: 40px;
  color: white;
  font-size: 0.75rem;
  cursor: pointer;
  transition: all 0.2s;
  font-family: 'DM Sans', sans-serif;
}

.guide-btn:hover {
  background: rgba(0, 255, 255, 0.2);
}

.guide-btn:active {
  transform: scale(0.95);
}

.guide-btn.yes { 
  background: rgba(34, 197, 94, 0.2); 
  border-color: rgba(34, 197, 94, 0.5); 
  color: #22c55e; 
  font-weight: 600;
}

.guide-btn.yes:hover {
  background: rgba(34, 197, 94, 0.35);
  box-shadow: 0 0 18px rgba(34, 197, 94, 0.25);
}

.guide-btn.no { 
  background: rgba(239, 68, 68, 0.2); 
  border-color: rgba(239, 68, 68, 0.5); 
  color: #ef4444; 
  font-weight: 600;
}

.guide-btn.no:hover {
  background: rgba(239, 68, 68, 0.35);
  box-shadow: 0 0 18px rgba(239, 68, 68, 0.25);
}

/* Toast */
.toast {
  position: fixed;
  top: 24px;
  left: 50%;
  transform: translateX(-50%);
  background: #0a0f1e;
  border: 1px solid cyan;
  border-radius: 40px;
  padding: 10px 24px;
  font-size: 0.8rem;
  opacity: 0;
  transition: opacity 0.3s ease;
  z-index: 200;
  pointer-events: none;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  box-shadow: 0 4px 16px rgba(0, 0, 0, 0.5);
  font-family: 'Space Mono', monospace;
}

.toast.show {
  opacity: 1;
}

/* Responsive */
@media (max-width: 480px) {
  .main-container {
    padding: 1rem;
    gap: 1.5rem;
  }
  
  .holo-mic-container {
    width: 160px;
    height: 160px;
  }
  
  .ring1 { width: 75px; height: 75px; }
  .ring2 { width: 105px; height: 105px; }
  .ring3 { width: 135px; height: 135px; }
  
  .mic-core {
    width: 62px;
    height: 62px;
    font-size: 1.8rem;
  }
  
  .panel-toggle {
    bottom: 18px;
    right: 18px;
    width: 48px;
    height: 48px;
    font-size: 1.3rem;
  }
  
  .guide-buttons {
    gap: 6px;
  }
  
  .guide-btn {
    padding: 6px 12px;
    font-size: 0.7rem;
  }
  
  .info-panel {
    width: 100%;
  }
}

/* Accessibilité */
.sr-only {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  margin: -1px;
  overflow: hidden;
  clip: rect(0, 0, 0, 0);
  border: 0;
}
</style>
</head>
<body>

<!-- Fond simple -->
<div class="holo-bg" aria-hidden="true"></div>

<!-- Overlay du panneau -->
<div class="panel-overlay" id="panelOverlay"></div>

<!-- Conteneur principal -->
<div class="main-container">
  <div class="title-wrap">
    <h1 class="hero">IAOS T4</h1>
    <p class="hero-sub">DUALIS U53700 · ASSISTANT HOLOGRAMME</p>
  </div>
  
  <!-- Micro -->
  <div class="holo-mic-container">
    <div class="holo-mic" id="holoMic" role="button" aria-label="Activer le microphone" tabindex="0">
      <div class="mic-holo-ring ring1" aria-hidden="true"></div>
      <div class="mic-holo-ring ring2" aria-hidden="true"></div>
      <div class="mic-holo-ring ring3" aria-hidden="true"></div>
      <div class="mic-core" id="micCore" aria-hidden="true">🎤</div>
    </div>
  </div>
  
  <div class="status-pill" aria-live="polite">
    <div class="status-dot" id="statusDot" role="status"></div>
    <span id="statusText">Appuyez sur l'hologramme</span>
    <div class="wave" id="waveAnim" style="display:none;" aria-hidden="true">
      <span></span><span></span><span></span><span></span>
    </div>

function toast(msg, duration = 3000) {

  clearTimeout(toastEl._timeout);
  toastEl._timeout = setTimeout(() => {
    toastEl.classList.remove('show');

}

function updateUIForState(state) {
  switch(state) {
    case 'listen':
      micCore.classList.add('listening');
      micCore.classList.remove('speaking', 'error');
      statusDot.classList.add('active');
      statusDot.classList.remove('speaking');
      statusDot.style.background = '';
      statusText.innerText = '🎙️ ÉCOUTE ACTIVE ...';
      waveAnim.style.display = 'flex';
      break;
    case 'speak':
      micCore.classList.remove('listening', 'error');
      micCore.classList.add('speaking');
      statusDot.classList.add('speaking');
      statusDot.classList.remove('active');
      statusDot.style.background = '';
      statusText.innerText = '📢 PARLE ...';
      waveAnim.style.display = 'none';
      break;
    case 'error':

      statusDot.classList.remove('active', 'speaking');
      statusDot.style.background = '';
      waveAnim.style.display = 'none';

      break;

      statusDot.style.background = '#475569';
      statusText.innerText = 'Hologramme prêt · Appuyez';

// ==================== SYNTHÈSE VOCALE ====================
function speakText(txt, callback) {
  if (!voiceSupport) {
    console.warn('Synthèse vocale non supportée');
    if (callback) callback();
    return;
  }
  
  if (speakingFlag) {
    synth.cancel();
  }
  
  let clean = txt.replace(/[<[\]{}_*#✅🚨]/g, '').replace(/&[a-z]+;/g, '');
  clean = clean.replace(/(\b[A-Z]{2,5}\b)/g, m => m.split('').join(' '));
  
  const utter = new SpeechSynthesisUtterance(clean);
  utter.lang = 'fr-FR';
  utter.rate = 0.9;
  utter.volume = 1;
  
  const voices = synth.getVoices();
  const frenchVoice = voices.find(v => v.lang.startsWith('fr'));
  if (frenchVoice) utter.voice = frenchVoice;
  
  speakingFlag = true;
  updateUIForState('speak');
  
  if (listening) stopListening();
  
  utter.onend = () => {
    speakingFlag = false;
    updateUIForState('idle');
    if (micActive && !guideActive) startListening();
    if (callback) callback();
  };
  
  utter.onerror = (e) => {
    console.error('Erreur synthèse vocale:', e);
    speakingFlag = false;
    updateUIForState('error');
    if (micActive && !guideActive) startListening();
    if (callback) callback();
  };
  
  synth.speak(utter);
}

function addMessage(text, role) {

  div.innerHTML = `<div class="bubble">${text}</div>`;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
  
  while (container.children.length > 50) {
    container.removeChild(container.firstChild);
  }
}

// ==================== RECHERCHE IOS ====================
function findIOSByQuery(query) {
  let q = query.toLowerCase().trim();
  
  let match = q.match(/(?:ios\s*)?(\d{3}|\d{1,3})/i);
  if (match) {
    let id = match[1].padStart(3, '0');
    if (IOS[id]) return IOS[id];
  }
  
  for (let [alias, id] of Object.entries(ALIAS)) {
    if (q.includes(alias)) return IOS[id];
  }
  
  for (let ios of Object.values(IOS)) {
    if (ios.desc.toLowerCase().includes(q)) return ios;
    if (ios.kw && ios.kw.some(k => q.includes(k))) return ios;
  }
  
  if (q.length >= 3) {
    for (let ios of Object.values(IOS)) {
      if (ios.desc.toLowerCase().includes(q.substring(0, 3))) return ios;
      if (ios.kw && ios.kw.some(k => k.includes(q.substring(0, 3)))) return ios;
    }
  }
  
  return null;
}

// ==================== GUIDAGE ====================
function startGuidage() {
  if (!currentIOS) {
    addMessage("Aucun IOS actif. Cherchez d'abord un code ou une panne.", 'ai');
    speakText("Aucun IOS sélectionné. Veuillez d'abord chercher un code.");
    return;
  }
  
  if (guideActive) {
    addMessage("Un guidage est déjà en cours.", 'ai');
    speakText("Guidage déjà en cours.");
    return;
  }
  
  guideActive = true;
  guideSteps = [...currentIOS.tree];
  stepIndex = 0;
  guideBar.classList.add('active');
  renderStep();
  addMessage("🚀 <strong>Guidage lancé</strong> pour IOS " + currentIOS.id + ". Suivez les étapes.", 'ai');
}

function renderStep() {
  if (!guideActive || stepIndex >= guideSteps.length) {
    finishProcedure("✅ Fin de la procédure.");
    return;
  }
  
  let step = guideSteps[stepIndex];
  if (step.fin) {
    finishProcedure(step.t || "Procédure achevée.");
    return;
  }
  
  document.getElementById('guideStepLabel').innerHTML = `ÉTAPE ${stepIndex+1}/${guideSteps.length} · IOS ${currentIOS.id}`;
  document.getElementById('guideText').innerHTML = step.t;
  
  let yesBtn = document.getElementById('yesBtn');
  let noBtn = document.getElementById('noBtn');
  
  if (step.d) {
    yesBtn.style.display = 'inline-flex';
    noBtn.style.display = 'inline-flex';
  } else {
    yesBtn.style.display = 'none';
    noBtn.style.display = 'none';
  }
  
  addMessage(`📌 Étape ${stepIndex+1}: ${step.t}`, 'ai');
  speakText(step.t);
}

function answerYes() {
  if (guideActive && guideSteps[stepIndex] && guideSteps[stepIndex].d) {
    processAnswer(true);
  } else {
    addMessage("Aucune question oui/non en attente.", 'ai');
  }
}

function answerNo() {
  if (guideActive && guideSteps[stepIndex] && guideSteps[stepIndex].d) {
    processAnswer(false);
  } else {
    addMessage("Aucune question oui/non en attente.", 'ai');
  }
}

function processAnswer(yes) {
  let step = guideSteps[stepIndex];
  let next = yes ? (step.oui || []) : (step.non || []);
  addMessage(yes ? "✓ OUI" : "✗ NON", 'user');
  
  if (next.length === 0) {
    finishProcedure("✅ Fin de la procédure.");
    return;
  }
  
  guideSteps = next;
  stepIndex = 0;
  renderStep();
}

function nextStepAction() {
  if (!guideActive) return;
  let step = guideSteps[stepIndex];
  if (step && step.d) {
    speakText("Veuillez répondre par oui ou par non.");
    addMessage("⚠️ Cette étape nécessite une réponse oui/non.", 'ai');
    return;
  }
  stepIndex++;
  renderStep();
}

function prevStepAction() {
  if (guideActive && stepIndex > 0) {
    stepIndex--;
    renderStep();
  } else {
    speakText("Vous êtes à la première étape.");
    addMessage("ℹ️ Première étape.", 'ai');
  }
}

function finishProcedure(msg) {
  guideActive = false;
  guideBar.classList.remove('active');
  
  const finalMsg = msg.includes("Fin de la procédure") ? msg : "✅ Fin de la procédure. " + msg;
  addMessage(finalMsg, 'ai');
  speakText("Fin de la procédure. " + msg.replace(/[✅🚨]/g, ''));
  
  if (currentIOS) {
    addMessage(`🏁 Diagnostic terminé pour IOS ${currentIOS.id}.`, 'ai');
  }
}

function cancelProcedure() {
  guideActive = false;
  guideBar.classList.remove('active');
  addMessage("❌ Procédure annulée.", 'ai');
  speakText("Procédure annulée.");
}

// ==================== COMMANDES VOCALES ====================
const COMMAND_PATTERNS = {
  // Salutations (NOUVEAU)
  salutation: [

  demarrer: [

  // Suivant
  suivant: [

  ],
  
  // Précédent
  precedent: [
    /\b(?:précédent|précédente|precedent|reviens|revenir|retour|retourne|en arrière|arrière|recule|reculer|back|étape d'avant|avant|l'étape d'avant|remonte|remonter|je veux revenir|j'ai fait une erreur|erreur|faux|je me suis trompé)\b/i
  ],
  
  // Oui
  oui: [
    /\b(?:oui|ouais|yes|yep|yup|affirmatif|affirmative|exact|exactement|correct|correcte|c'est ça|c'est exact|bien sûr|bien sur|évidemment|tout à fait|absolument|oui oui|j'ai fait|c'est fait|confirmé|je confirme|validé|c'est validé|ok pour moi|ok oui|présent|allumé|fonctionne|marche|ça marche|ça fonctionne|actif|activé)\b/i
  ],
  
  // Non
  non: [
    /\b(?:non|no|nope|nan|négatif|négative|pas du tout|pas ça|faux|c'est faux|incorrect|incorrecte|pas correct|disparu|absent|absente|éteint|éteinte|plus affiché|pas affiché|pas présent|pas de blocage|aucun|aucune|rien|néant|ne fonctionne pas|marche pas|ça marche pas|pas actif|désactivé|inactif|inactive)\b/i
  ],
  
  // Annuler
  annuler: [
    /\b(?:annuler|annule|annulation|stop|arrête|arrêter|interrompt|interrompre|abandonne|abandonner|abort|cancel|stoppe|stoppez|termine|terminer|quitte|quitter|j'arrête|je quitte|je stoppe)\b/i
  ],
  
  // Accueil
  accueil: [
    /\b(?:accueil|menu|menu principal|retour|retour accueil|home|racine|début|recommencer|reset|réinitialiser|nouveau départ|page d'accueil|écran principal)\b/i
  ],
  
  // Répéter
  repeter: [
    /\b(?:répète|répéter|redis|redire|encore|dis encore|dis moi encore|répète ça|redis ça|what|say again|repeat|quoi|pardon|hein|j'ai pas compris|pas compris|j'ai mal entendu|mal entendu|peux-tu répéter|tu peux répéter|reformule|explique encore)\b/i
  ],
  
  // Aide
  aide: [
    /\b(?:aide|help|commandes|que puis-je dire|que dire|options|quoi dire|comment faire|je suis perdu|je ne sais pas|incertain|que faire|liste des commandes|vocales|commandes vocales)\b/i
  ]
};

function isCommandMatch(text, commandType) {
  const patterns = COMMAND_PATTERNS[commandType];
  if (!patterns) return false;
  return patterns.some(pattern => pattern.test(text));
}

function processVoiceCommand(txt) {
  let lower = txt.toLowerCase().trim();
  addMessage(`🎤 "${txt}"`, 'user');
  
  // 1. Salutations (NOUVEAU - priorité haute pour les salutations)
  if (isCommandMatch(lower, 'salutation')) {
    const greetings = [
      "Bonjour ! Je suis IAOS T4, votre assistant holographique. Dites un numéro IOS ou décrivez une panne pour que je vous guide.",
      "Salut ! Prêt à vous assister. Quel IOS ou quelle panne souhaitez-vous traiter ?",
      "Bonjour à vous. Je suis à votre écoute. Dites-moi quel code IOS ou quelle panne vous concerne.",
      "Salam alaykoum. IAOS T4 à votre service. Dites un numéro d'IOS ou décrivez votre problème."
    ];
    const greeting = greetings[Math.floor(Math.random() * greetings.length)];
    addMessage(`👋 ${greeting}`, 'ai');
    speakText(greeting);
    return;
  }
  
  // 2. Aide
  if (isCommandMatch(lower, 'aide')) {
    const helpText = "Commandes disponibles : démarrer le guidage, suivant, précédent, oui, non, annuler, accueil, répète, aide. Vous pouvez aussi dire bonjour, ou chercher un IOS par son numéro ou sa description.";
    addMessage(`💡 ${helpText}`, 'ai');
    speakText("Voici les commandes disponibles. Dites démarrer pour lancer un guidage, suivant pour continuer, précédent pour revenir, oui ou non pour répondre, annuler pour arrêter, accueil pour revenir au menu, répète pour réécouter, ou cherchez un IOS.");
    return;
  }
  
  // 3. Annuler (priorité haute)
  if (isCommandMatch(lower, 'annuler')) {
    if (guideActive) {
      cancelProcedure();
    } else {
      homeReset();
    }
    return;
  }
  
  // 4. Accueil
  if (isCommandMatch(lower, 'accueil')) {
    homeReset();
    return;
  }
  
  // 5. Démarrer guidage
  if (isCommandMatch(lower, 'demarrer')) {
    if (currentIOS && !guideActive) {
      startGuidage();
    } else if (guideActive) {
      addMessage("Un guidage est déjà en cours.", 'ai');
      speakText("Guidage déjà en cours.");
    } else {
      addMessage("Aucun IOS sélectionné. Dites un numéro ou décrivez une panne d'abord.", 'ai');
      speakText("Cherchez d'abord un IOS.");
    }
    return;
  }
  
  // 6. OUI (dans le contexte du guidage)
  if (isCommandMatch(lower, 'oui') && !isCommandMatch(lower, 'non')) {
    if (guideActive && guideSteps[stepIndex] && guideSteps[stepIndex].d) {
      answerYes();
    } else {
      addMessage("Je n'attends pas de réponse oui/non actuellement.", 'ai');
      speakText("Pas de question en attente.");
    }
    return;
  }
  
  // 7. NON (dans le contexte du guidage)
  if (isCommandMatch(lower, 'non')) {
    if (guideActive && guideSteps[stepIndex] && guideSteps[stepIndex].d) {
      answerNo();
    } else {
      addMessage("Pas de question oui/non en cours.", 'ai');
      speakText("Pas de question en attente.");
    }
    return;
  }
  
  // 8. Suivant
  if (isCommandMatch(lower, 'suivant') && !isCommandMatch(lower, 'non') && !isCommandMatch(lower, 'precedent')) {
    if (guideActive) {
      nextStepAction();
    } else {
      addMessage("Aucun guidage en cours. Dites démarrer pour lancer la procédure.", 'ai');
      speakText("Aucun guidage actif.");
    }
    return;
  }
  
  // 9. Précédent
  if (isCommandMatch(lower, 'precedent')) {
    if (guideActive) {
      prevStepAction();
    } else {
      addMessage("Aucun guidage en cours.", 'ai');
    }
    return;
  }
  
  // 10. Répéter
  if (isCommandMatch(lower, 'repeter')) {
    if (guideActive && guideSteps[stepIndex]) {
      speakText(guideSteps[stepIndex].t);
      addMessage("🔁 Je répète l'étape en cours.", 'ai');
    } else if (currentIOS) {
      speakText(currentIOS.desc);
      addMessage(`🔁 IOS ${currentIOS.id}: ${currentIOS.desc}`, 'ai');
    } else {
      speakText("Aucune information à répéter. Dites un numéro d'IOS ou décrivez une panne.");
      addMessage("ℹ️ Aucune information en mémoire.", 'ai');
    }
    return;
  }
  
  // 11. Recherche d'IOS
  let iosFound = findIOSByQuery(lower);
  if (iosFound) {
    showIOSDetails(iosFound);
  } else {
    const noResultMsg = `Aucun résultat pour "${txt}". Essayez "IOS 061", "boîte chaude", "frein", "batterie"...`;
    addMessage(noResultMsg, 'ai');
    speakText("Aucun IOS trouvé. Veuillez reformuler votre recherche.");
  }
}

// ==================== RECONNAISSANCE VOCALE ====================
function startListening() {
  if (!('SpeechRecognition' in window) && !('webkitSpeechRecognition' in window)) {
    toast("Reconnaissance vocale non supportée");
    return;
  }
  
  if (speakingFlag || listening) return;
  
  try {
    let SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SR();
    recognition.lang = 'fr-FR';
    recognition.continuous = false;
    recognition.interimResults = false;
    recognition.maxAlternatives = 3;
    
    recognition.onstart = () => {
      listening = true;
      micActive = true;
      updateUIForState('listen');
    };
    
    recognition.onresult = (e) => {
      let bestTranscript = '';
      let bestConfidence = 0;
      
      for (let i = 0; i < e.results[0].length; i++) {
        if (e.results[0][i].confidence > bestConfidence) {
          bestConfidence = e.results[0][i].confidence;
          bestTranscript = e.results[0][i].transcript;
        }
      }
      
      console.log(`Reconnaissance: "${bestTranscript}" (confiance: ${bestConfidence.toFixed(2)})`);
      
      if (bestConfidence < 0.2) {
        addMessage("Je n'ai pas bien compris. Pouvez-vous répéter ?", 'ai');
        speakText("Je n'ai pas compris. Pouvez-vous répéter ?");
        return;
      }
      
      processVoiceCommand(bestTranscript);
    };
    
    recognition.onerror = (e) => {
      console.error('Erreur reconnaissance:', e.error);
      listening = false;
      
      switch(e.error) {
        case 'no-speech':
          break;
        case 'audio-capture':
          toast("Microphone non disponible");
          micActive = false;
          break;
        case 'not-allowed':
          toast("Permission microphone refusée");
          micActive = false;
          break;
        case 'network':
          toast("Erreur réseau - reconnaissance vocale");
          break;
        default:
          break;
      }
      
      updateUIForState('idle');
      
      if (micActive && !speakingFlag) {
        clearTimeout(recognitionTimeout);
        recognitionTimeout = setTimeout(startListening, 600);
      }
    };
    
    recognition.onend = () => {
      listening = false;
      
      if (micActive && !speakingFlag && !guideActive) {
        clearTimeout(recognitionTimeout);
        recognitionTimeout = setTimeout(startListening, 400);
      } else {
        updateUIForState('idle');
      }
    };
    
    recognition.start();
  } catch (e) {
    console.error('Erreur initialisation reconnaissance:', e);
    toast("Erreur d'initialisation du microphone");
  }
}

function stopListening() {
  if (recognition) {
    try {
      recognition.stop();
    } catch (e) {}
    recognition = null;
  }
  clearTimeout(recognitionTimeout);
  listening = false;
  micActive = false;
  updateUIForState('idle');
}

// ==================== GESTIONNAIRES D'ÉVÉNEMENTS ====================

// Micro
document.getElementById('holoMic').addEventListener('click', () => {
  if (speakingFlag) {
    synth.cancel();
    speakingFlag = false;
    updateUIForState('idle');
    return;
  }
  
  if (!micActive) {
    micActive = true;
    startListening();
  } else {
    stopListening();
    micActive = false;
  }
});

});

// ==================== GESTION CYCLE DE VIE ====================
document.addEventListener('visibilitychange', () => {
  if (document.hidden) {
    if (listening) stopListening();
    if (speakingFlag) synth.cancel();
  } else {
    if (micActive && !speakingFlag && !guideActive) {
      startListening();
    }
  }
});

// Geste tactile pour fermer le panneau (swipe droite)
let touchStartX = 0;
let touchStartY = 0;
let touchMoved = false;

panel.addEventListener('touchstart', (e) => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
  touchMoved = false;
}, { passive: true });

panel.addEventListener('touchmove', (e) => {
  const touchCurrentX = e.touches[0].clientX;
  const touchCurrentY = e.touches[0].clientY;
  const diffX = touchCurrentX - touchStartX;
  const diffY = Math.abs(touchCurrentY - touchStartY);
  
  if (diffX > 30 && diffX > diffY) {
    touchMoved = true;
    panel.style.transform = `translateX(${diffX}px)`;
    panel.style.transition = 'none';
  }
}, { passive: true });

panel.addEventListener('touchend', (e) => {
  panel.style.transition = '';
  
  if (touchMoved) {
    const touchEndX = e.changedTouches[0].clientX;
    const diff = touchEndX - touchStartX;
    
    if (diff > 80) {
      closePanel();
    } else {
      panel.style.transform = '';
    }
  }
});
