<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg-dark:#010208;--bg-panel:rgba(2,5,15,0.96);--cyan:#0ff;--purple:#c084fc;--green:#22c55e;--red:#ef4444;--amber:#f59e0b;--text:#e2e8f0;--text-dim:#7f8ea3}
body{font-family:'DM Sans',sans-serif;background:var(--bg-dark);color:var(--text);min-height:100vh;overflow-x:hidden;position:relative}
.holo-bg{position:fixed;inset:0;background:radial-gradient(circle at 15% 25%,rgba(0,200,255,0.04),transparent 50%),radial-gradient(circle at 85% 70%,rgba(180,100,255,0.03),transparent 50%);pointer-events:none;z-index:0}
.main-container{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;min-height:100vh;padding:1.5rem;gap:1.5rem;padding-bottom:120px}
.title-wrap{text-align:center;padding:0.6rem 2rem;border-radius:80px;background:rgba(0,20,40,0.35);border:1px solid rgba(0,255,255,0.15);width:100%;max-width:600px}
.hero{font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(2.5rem,8vw,4.2rem);color:#fff;letter-spacing:-0.02em}
.hero-sub{font-family:'Space Mono',monospace;font-size:0.6rem;letter-spacing:4px;color:var(--cyan)}
.active-ios-display{width:100%;max-width:600px;background:rgba(5,12,25,0.8);border:1px solid rgba(0,255,255,0.3);border-radius:20px;padding:18px;display:none;animation:fadeUp 0.3s ease}
.active-ios-display.show{display:block}
.active-ios-header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:8px}
.active-ios-id{font-family:'Space Mono',monospace;font-size:1.4rem;font-weight:700;color:#fff}
.active-ios-desc{font-size:0.9rem;color:#e2e8f0;margin-bottom:6px}
.active-ios-meta{display:flex;gap:10px;align-items:center;flex-wrap:wrap;font-size:0.7rem;font-family:'Space Mono',monospace}
.mic-wave-container{position:relative;width:200px;height:200px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform 0.2s ease;user-select:none;flex-shrink:0}
.mic-wave-container:active{transform:scale(0.95)}
.mic-ring{position:absolute;border-radius:50%;border:1.5px solid rgba(0,255,255,0.3);animation:pulseRing 2.8s infinite ease-in-out}
.mic-ring:nth-child(1){width:95px;height:95px;animation-delay:0s}
.mic-ring:nth-child(2){width:135px;height:135px;animation-delay:0.5s}
.mic-ring:nth-child(3){width:175px;height:175px;animation-delay:1s}
@keyframes pulseRing{0%{transform:scale(0.93);opacity:0.5;border-color:rgba(0,255,255,0.4)}50%{transform:scale(1.04);opacity:1;border-color:rgba(0,255,255,0.9);box-shadow:0 0 18px rgba(0,255,255,0.4)}100%{transform:scale(0.93);opacity:0.5}}
.wave-bars{position:relative;z-index:5;display:flex;align-items:center;justify-content:center;gap:4px;height:60px;width:80px;border-radius:50%;background:radial-gradient(circle,rgba(0,255,255,0.1),transparent 70%);transition:all 0.3s ease}
.wave-bar{width:5px;border-radius:3px;background:var(--cyan);box-shadow:0 0 8px rgba(0,255,255,0.5);transition:all 0.15s ease;animation:waveBarAnim 0.8s infinite ease-in-out}
.wave-bar:nth-child(1){height:18px;animation-delay:0s}
.wave-bar:nth-child(2){height:30px;animation-delay:0.1s}
.wave-bar:nth-child(3){height:42px;animation-delay:0.2s}
.wave-bar:nth-child(4){height:30px;animation-delay:0.3s}
.wave-bar:nth-child(5){height:18px;animation-delay:0.4s}
@keyframes waveBarAnim{0%,100%{transform:scaleY(0.5);opacity:0.5}50%{transform:scaleY(1);opacity:1}}
.wave-bars.idle .wave-bar{background:var(--cyan);box-shadow:0 0 8px rgba(0,255,255,0.5)}
.wave-bars.listening .wave-bar{background:var(--green);box-shadow:0 0 12px rgba(34,197,94,0.7);animation-duration:0.5s}
.wave-bars.speaking .wave-bar{background:var(--purple);box-shadow:0 0 12px rgba(192,132,252,0.7);animation-duration:0.6s}
.wave-bars.error .wave-bar{background:var(--red);box-shadow:0 0 10px rgba(239,68,68,0.6);animation:errorShake 0.4s}
@keyframes errorShake{0%,100%{transform:translateX(0) scaleY(1)}20%{transform:translateX(-5px) scaleY(0.7)}40%{transform:translateX(5px) scaleY(1.2)}60%{transform:translateX(-3px) scaleY(0.8)}80%{transform:translateX(3px) scaleY(1.1)}}
.mic-wave-container.listening .mic-ring{border-color:rgba(34,197,94,0.5)!important;animation-duration:1.8s}
.mic-wave-container.speaking .mic-ring{border-color:rgba(192,132,252,0.5)!important;animation-duration:1.6s}
.status-pill{display:flex;gap:12px;align-items:center;background:rgba(0,10,25,0.7);backdrop-filter:blur(8px);border:1px solid rgba(0,255,255,0.3);border-radius:60px;padding:10px 26px;font-size:0.8rem;font-family:'Space Mono',monospace}
.status-dot{width:9px;height:9px;border-radius:50%;background:#475569;transition:all 0.3s ease;flex-shrink:0}
.status-dot.active{background:var(--green);box-shadow:0 0 10px var(--green)}
.status-dot.speaking{background:var(--purple);box-shadow:0 0 10px var(--purple)}
.panel-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:98;opacity:0;pointer-events:none;transition:opacity 0.3s ease}
.panel-overlay.active{opacity:1;pointer-events:auto}
.info-panel{position:fixed;top:0;right:0;width:min(94%,450px);height:100%;background:var(--bg-panel);backdrop-filter:blur(20px);border-left:1px solid rgba(0,255,255,0.35);z-index:100;transform:translateX(105%);transition:transform 0.35s cubic-bezier(0.22,0.61,0.36,1);display:flex;flex-direction:column;box-shadow:-8px 0 40px rgba(0,0,0,0.6)}
.info-panel.open{transform:translateX(0)}
.panel-header{display:flex;justify-content:space-between;align-items:center;padding:18px 20px;border-bottom:1px solid rgba(0,255,255,0.2);background:rgba(0,0,0,0.4)}
.panel-header h3{font-family:'Space Mono',monospace;font-size:0.7rem;letter-spacing:3px;color:var(--cyan)}
.close-panel{background:rgba(0,0,0,0.3);border:1px solid rgba(0,255,255,0.3);color:var(--text-dim);width:34px;height:34px;border-radius:10px;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center}
.panel-content{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:18px}
.panel-toggle{position:fixed;bottom:28px;right:28px;width:56px;height:56px;border-radius:30px;background:rgba(0,20,40,0.9);backdrop-filter:blur(12px);border:1.5px solid rgba(0,255,255,0.5);color:var(--cyan);font-size:1.6rem;cursor:pointer;z-index:102;display:flex;align-items:center;justify-content:center;transition:all 0.3s ease;box-shadow:0 0 18px rgba(0,255,255,0.25)}
.panel-toggle:hover{transform:scale(1.06)}
.panel-toggle .gear-icon{transition:transform 0.5s ease}
.panel-toggle:hover .gear-icon{transform:rotate(90deg)}
.panel-toggle.panel-open .gear-icon{transform:rotate(180deg)}
.search-box{background:rgba(0,15,30,0.7);border:1px solid rgba(0,255,255,0.25);border-radius:50px;display:flex;align-items:center;padding:5px 6px 5px 20px;gap:10px}
.search-box input{flex:1;background:none;border:none;outline:none;color:var(--text);font-size:0.9rem;padding:12px 0}
.search-box input::placeholder{color:var(--text-dim)}
.search-box button{background:rgba(0,255,255,0.15);border:1px solid rgba(0,255,255,0.3);padding:9px 20px;border-radius:40px;color:var(--cyan);cursor:pointer;font-family:'Space Mono',monospace;font-size:0.75rem}
.ios-detail-card{background:rgba(5,12,25,0.8);border:1px solid rgba(0,255,255,0.3);border-radius:22px;overflow:hidden;display:none;animation:fadeUp 0.3s ease}
.ios-detail-card.show{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.card-header{padding:18px;border-bottom:1px solid rgba(0,255,255,0.2)}
.ios-code{font-family:'Space Mono',monospace;font-size:1.3rem;font-weight:700;color:#fff}
.prio-badge{font-size:0.6rem;padding:4px 10px;border-radius:20px;display:inline-block;margin-top:6px;font-family:'Space Mono',monospace;letter-spacing:1px}
.prio-h{background:rgba(239,68,68,0.2);color:#f87171;border:1px solid rgba(239,68,68,0.4);animation:prioUrgentPulse 1.5s infinite}
@keyframes prioUrgentPulse{0%,100%{box-shadow:0 0 5px rgba(239,68,68,0.3)}50%{box-shadow:0 0 15px rgba(239,68,68,0.6)}}
.prio-m{background:rgba(245,158,11,0.2);color:#fbbf24;border:1px solid rgba(245,158,11,0.4)}
.prio-l{background:rgba(34,197,94,0.2);color:#4ade80;border:1px solid rgba(34,197,94,0.4)}
.card-actions{padding:14px 18px;display:flex;gap:10px;flex-wrap:wrap;border-bottom:1px solid rgba(0,255,255,0.1)}
.action-btn{background:rgba(0,255,255,0.06);border:1px solid rgba(0,255,255,0.25);padding:7px 16px;border-radius:30px;color:var(--cyan);font-size:0.75rem;cursor:pointer;transition:all 0.2s}
.action-btn:hover{background:rgba(0,255,255,0.18)}
.action-btn.green{background:rgba(34,197,94,0.12);border-color:rgba(34,197,94,0.5);color:#22c55e}
.action-btn.red{background:rgba(239,68,68,0.08);border-color:rgba(239,68,68,0.4);color:#ef4444}
.card-body{padding:18px;font-size:0.85rem;color:var(--text-dim);line-height:1.6}
.chat-area{background:rgba(0,10,22,0.6);border-radius:20px;border:1px solid rgba(0,255,255,0.2);overflow:hidden}
.chat-messages{height:240px;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px}
.message{display:flex;gap:8px;max-width:88%;animation:messageIn 0.25s ease}
@keyframes messageIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.message.user{align-self:flex-end;flex-direction:row-reverse}
.message.ai .bubble{background:rgba(0,120,200,0.15);border-radius:6px 16px 16px 16px;border:1px solid rgba(0,255,255,0.2)}
.message.user .bubble{background:rgba(124,58,237,0.15);border-radius:16px 6px 16px 16px;border:1px solid rgba(168,85,247,0.4)}
.bubble{padding:10px 14px;font-size:0.82rem;line-height:1.5;word-break:break-word}
.guide-bar{position:fixed;bottom:0;left:0;width:100%;background:rgba(1,3,12,0.97);backdrop-filter:blur(20px);border-top:1px solid rgba(0,255,255,0.4);padding:16px 22px;z-index:90;transform:translateY(100%);transition:transform 0.35s ease;box-shadow:0 -6px 30px rgba(0,0,0,0.5)}
.guide-bar.active{transform:translateY(0)}
.guide-step{font-family:'Space Mono',monospace;font-size:0.65rem;color:var(--green);letter-spacing:2px}
.guide-text{font-size:0.95rem;margin:10px 0;line-height:1.5;font-weight:500}
.guide-buttons{display:flex;gap:10px;flex-wrap:wrap}
.guide-btn{background:rgba(0,30,50,0.8);border:1px solid rgba(0,255,255,0.3);padding:8px 18px;border-radius:40px;color:#fff;font-size:0.75rem;cursor:pointer;transition:all 0.2s}
.guide-btn.yes{background:rgba(34,197,94,0.2);border-color:rgba(34,197,94,0.5);color:#22c55e;font-weight:600}
.guide-btn.no{background:rgba(239,68,68,0.2);border-color:rgba(239,68,68,0.5);color:#ef4444;font-weight:600}
.toast{position:fixed;top:24px;left:50%;transform:translateX(-50%);background:#0a0f1e;border:1px solid cyan;border-radius:40px;padding:10px 24px;font-size:0.8rem;opacity:0;transition:opacity 0.3s ease;z-index:200;pointer-events:none;font-family:'Space Mono',monospace}
.toast.show{opacity:1}
.ios-list-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:150;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.3s ease}
.ios-list-overlay.active{opacity:1;pointer-events:auto}
.ios-list-panel{background:rgba(2,5,18,0.98);border:1px solid rgba(0,255,255,0.4);border-radius:24px;width:min(90%,500px);max-height:80vh;display:flex;flex-direction:column;box-shadow:0 0 40px rgba(0,0,0,0.8);overflow:hidden}
.ios-list-header{padding:16px 20px;border-bottom:1px solid rgba(0,255,255,0.3);display:flex;justify-content:space-between;align-items:center;background:rgba(0,0,0,0.4)}
.ios-list-header h3{font-family:'Space Mono',monospace;color:var(--cyan);font-size:0.8rem;letter-spacing:2px}
.ios-list-close{background:none;border:1px solid rgba(0,255,255,0.3);color:var(--text-dim);width:30px;height:30px;border-radius:8px;cursor:pointer}
.ios-list-scroll{overflow-y:auto;flex:1;padding:10px}
.ios-list-item{padding:12px 16px;border-bottom:1px solid rgba(0,255,255,0.1);cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:12px;border-radius:10px;margin:2px 0}
.ios-list-item:hover{background:rgba(0,255,255,0.1)}
.ios-list-num{font-family:'Space Mono',monospace;font-weight:700;color:var(--cyan);min-width:50px;font-size:0.85rem}
.ios-list-desc{font-size:0.82rem;color:var(--text);flex:1}
.ios-list-prio{font-size:0.6rem;padding:2px 8px;border-radius:12px;font-family:'Space Mono',monospace}
.ios-list-prio.h{background:rgba(239,68,68,0.2);color:#f87171}
.ios-list-prio.m{background:rgba(245,158,11,0.2);color:#fbbf24}
.ios-list-prio.l{background:rgba(34,197,94,0.2);color:#4ade80}
.recap-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:160;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.3s ease}

.recap-panel{background:#fff;border-radius:16px;width:min(92%,550px);max-height:85vh;display:flex;flex-direction:column;box-shadow:0 10px 50px rgba(0,0,0,0.5);overflow:hidden}
.recap-header{padding:16px 20px;border-bottom:1px solid #e2e8f0;display:flex;justify-content:space-between;align-items:center;background:#f8fafc}
.recap-header h3{font-family:'Space Mono',monospace;color:#1e293b;font-size:0.85rem}
.recap-close{background:none;border:1px solid #cbd5e1;color:#64748b;width:30px;height:30px;border-radius:8px;cursor:pointer}

.recap-btn{padding:8px 18px;border-radius:30px;border:1px solid #cbd5e1;background:#fff;cursor:pointer;font-size:0.8rem}
.recap-btn.primary{background:#1e293b;color:#fff;border-color:#1e293b}
.end-questions{position:fixed;bottom:0;left:0;width:100%;background:rgba(1,3,12,0.97);backdrop-filter:blur(20px);border-top:1px solid rgba(0,255,255,0.4);padding:16px 22px;z-index:91;transform:translateY(100%);transition:transform 0.35s ease}

.end-questions-text{font-size:0.9rem;margin-bottom:10px}
.end-questions-buttons{display:flex;gap:10px;flex-wrap:wrap}
@media(max-width:480px){.mic-wave-container{width:150px;height:150px}.mic-ring:nth-child(1){width:70px;height:70px}.mic-ring:nth-child(2){width:100px;height:100px}.mic-ring:nth-child(3){width:130px;height:130px}.wave-bars{height:45px;width:60px;gap:3px}.wave-bar{width:4px}.wave-bar:nth-child(1){height:14px}.wave-bar:nth-child(2){height:22px}.wave-bar:nth-child(3){height:32px}.wave-bar:nth-child(4){height:22px}.wave-bar:nth-child(5){height:14px}}
</style>

<body>
<div class="holo-bg" aria-hidden="true"></div>
<div class="panel-overlay" id="panelOverlay"></div>
<div class="main-container">
<div class="title-wrap"><h1 class="hero">IAOS T4</h1><p class="hero-sub">DUALIS U53700 · ASSISTANT</p></div>
<div class="active-ios-display" id="activeIosDisplay"><div class="active-ios-header"><span class="active-ios-id" id="activeIosId"></span><span class="prio-badge" id="activeIosPrio"></span></div><div class="active-ios-desc" id="activeIosDesc"></div><div class="active-ios-meta"><span id="activeIosSteps"></span><span id="activeIosStatus"></span></div></div>
<div class="mic-wave-container" id="micWaveContainer" role="button" tabindex="0"><div class="mic-ring"></div><div class="mic-ring"></div><div class="mic-ring"></div><div class="wave-bars idle" id="waveBars"><div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div></div></div>
<div class="status-pill"><div class="status-dot" id="statusDot"></div><span id="statusText">Micro actif · Dites bonjour</span></div>
</div>
<button class="panel-toggle" id="panelToggle"><span class="gear-icon">⚙️</span></button>
<div class="info-panel" id="infoPanel" aria-hidden="true"><div class="panel-header"><h3>⚡ IAOS T4 · DIAGNOSTIC</h3><button class="close-panel" id="closePanel">✕</button></div><div class="panel-content"><div class="search-box"><input type="text" id="searchInput" placeholder="IOS 061, boîte chaude, frein..."><button id="searchBtn">🔍</button></div><button class="action-btn" id="showAllIosBtn" style="width:100%;text-align:center">📋 Liste de tous les IOS</button><div class="ios-detail-card" id="iosCard"><div class="card-header"><div class="ios-code"><span id="iosId">---</span></div><div class="prio-badge" id="iosPrio"></div><div id="iosDesc" style="margin-top:8px;font-size:0.88rem;color:#e2e8f0"></div></div><div class="card-actions"><button class="action-btn green" id="guideStartBtn">▶ GUIDAGE</button><button class="action-btn red" id="cancelGuideBtn">✕ ANNULER</button><button class="action-btn" id="homeBtn">⌂ ACCUEIL</button><button class="action-btn" id="newSearchBtn">🔍 NOUVEAU</button></div><div class="card-body" id="iosBody"></div></div><div class="chat-area"><div class="chat-messages" id="chatMsgs"><div class="message ai"><div class="bubble">✨ Micro actif. Dites un numéro IOS ou décrivez une panne.</div></div></div></div></div></div>

<div class="toast" id="toastMsg"></div>
<script>
// ==================== BASE DE DONNÉES IOS FIDÈLE (IOS 000 - IOS 247) ====================
const IOS={
'000':{id:'000',pri:'h',type:'MA',desc:'Boucle de sécurité des portes fermées verrouillées isolée',kw:['boucle','sécurité','portes','verrouillées'],tree:[{t:"Arrêt 1er quai. Aviser PC - Appliquer GD.",d:0},{t:"Évacuer les voyageurs à la prochaine station.",d:0,fin:1}]},
'001':{id:'001',pri:'m',type:'FU',desc:'FU inhibé si SAI en zone de quai',kw:['fu','sai','quai'],tree:[{t:"Aviser PC.",d:0,fin:1}]},

function speakText(t,cb){if(!voiceSupport){if(cb)cb();return}if(speakingFlag)synth.cancel();let x=t.replace(/[<[\]{}_*#✅🚨]/g,'').replace(/&[a-z]+;/g,'');x=x.replace(/km\/h/gi,'kilomètres par heure').replace(/\bart\.\s*/gi,'article ');x=x.replace(/IOS\s*(\d)(\d)(\d)/gi,(_,a,b,c)=>'IOS '+parseInt(a+b+c,10));x=x.replace(/\b0+(\d+)/g,'$1');const u=new SpeechSynthesisUtterance(x);u.lang='fr-FR';u.rate=0.9;u.volume=1;const v=synth.getVoices(),fv=v.find(z=>z.lang.startsWith('fr'));if(fv)u.voice=fv;speakingFlag=true;updateUIForState('speak');u.onend=()=>{speakingFlag=false;updateUIForState('idle');if(micActive&&!listening)startListening();if(cb)cb()};u.onerror=()=>{speakingFlag=false;updateUIForState('error');if(micActive&&!listening)startListening();if(cb)cb()};synth.speak(u)}

const CP={salutation:[/\b(?:bonjour|salut|salam|coucou|hello|hi|hey|bonsoir|salamou?\s*al[ae]ykoum?|wesh|yo)\b/i],heure:[/\b(?:quelle heure|il est quelle heure|donne l'heure|heure)\b/i],date:[/\b(?:quelle date|donne la date|date aujourd'hui|date|quel jour)\b/i],liste_ios:[/\b(?:liste des ios|tous les ios|affiche la liste|liste ios)\b/i],demarrer:[/\b(?:démarrer|commencer|lance|guidage|guide|start|go|exécute)\b/i],suivant:[/\b(?:suivant|passe à la suite|après|ensuite|prochaine|continuer|j'ai fini|ok|c'est bon|d'accord|next|terminé)\b/i],precedent:[/\b(?:précédent|reviens|retour|en arrière|recule|back|remonte)\b/i],oui:[/\b(?:oui|ouais|yes|yep|affirmatif|exact|correct|bien sûr|tout à fait|confirmé|validé|présent|allumé|ça marche|actif)\b/i],non:[/\b(?:non|no|nope|nan|négatif|pas du tout|faux|incorrect|disparu|absent|éteint|pas affiché|aucun|rien|marche pas|désactivé|inactif)\b/i],annuler:[/\b(?:annuler|stop|arrête|interrompt|abandonne|cancel|termine|quitte)\b/i],accueil:[/\b(?:accueil|menu|retour accueil|home|reset)\b/i],repeter:[/\b(?:répète|redis|encore|répète ça|what|repeat|pardon|hein|j'ai pas compris|reformule)\b/i],aide:[/\b(?:aide|help|commandes|options|quoi dire)\b/i]};
function icm(t,ty){const p=CP[ty];return p?p.some(r=>r.test(t)):false}
function pvc(txt){let l=txt.toLowerCase().trim();addMessage('🎤 "'+txt+'"','user');if(icm(l,'salutation')){if(/\b(?:salam|salem|salamou)\s*(?:al[ae]ykoum?|aleikoum?)/i.test(l)){addMessage('👋 Wa aleykoum salam.','ai');speakText('Wa aleykoum salam.');return}speakText('Bonjour ! IAOS T4 à votre service.');return}if(icm(l,'heure')){speakText('Il est '+ft(new Date())+'.');return}if(icm(l,'date')){speakText('Nous sommes le '+fd(new Date())+'.');return}if(icm(l,'liste_ios')){oil();return}if(icm(l,'aide')){speakText('Commandes: démarrer, suivant, précédent, oui, non, annuler, accueil, répète, heure, date, liste.');return}if(icm(l,'annuler')){ccp();return}if(icm(l,'accueil')){hr();return}if(icm(l,'demarrer')){if(currentIOS&&!guideActive)sg();else speakText("Cherchez d'abord un IOS.");return}if(icm(l,'oui')&&!icm(l,'non')){if(guideActive&&guideSteps[stepIndex]&&guideSteps[stepIndex].d)ay();return}if(icm(l,'non')){if(guideActive&&guideSteps[stepIndex]&&guideSteps[stepIndex].d)an();return}if(icm(l,'suivant')&&!icm(l,'non')&&!icm(l,'precedent')){if(guideActive)ns();return}if(icm(l,'precedent')){if(guideActive)ps();return}if(icm(l,'repeter')){if(guideActive&&guideSteps[stepIndex])speakText(guideSteps[stepIndex].t);return}let f=fiq(l);if(f)sdi(f);else speakText('Aucun IOS trouvé.')}
function sl(){if(!('SpeechRecognition'in window)&&!('webkitSpeechRecognition'in window))return;if(speakingFlag||listening)return;try{let SR=window.SpeechRecognition||window.webkitSpeechRecognition;recognition=new SR();recognition.lang='fr-FR';recognition.continuous=false;recognition.interimResults=false;recognition.maxAlternatives=3;recognition.onstart=()=>{listening=true;updateUIForState('listen')};recognition.onresult=(e)=>{let b='',bc=0;for(let i=0;i<e.results[0].length;i++){if(e.results[0][i].confidence>bc){bc=e.results[0][i].confidence;b=e.results[0][i].transcript}}if(bc<0.2)return;pvc(b)};recognition.onerror=()=>{listening=false;updateUIForState('idle');if(micActive&&!speakingFlag)setTimeout(sl,800)};recognition.onend=()=>{listening=false;if(micActive&&!speakingFlag)setTimeout(sl,500);else updateUIForState('idle')};recognition.start()}catch(e){if(micActive)setTimeout(sl,1000)}}
function stl(){if(recognition){try{recognition.stop()}catch(e){}recognition=null}listening=false;updateUIForState('idle')}
document.getElementById('micWaveContainer').addEventListener('click',()=>{if(speakingFlag)return;micActive=!micActive;if(micActive){sl();document.getElementById('statusDot').style.background='';document.getElementById('statusText').innerText='Micro actif'}else{stl();document.getElementById('statusText').innerText='Micro en pause';document.getElementById('statusDot').style.background='#ef4444'}});

document.getElementById('searchBtn').addEventListener('click',()=>{let v=document.getElementById('searchInput').value;if(v){pvc(v);document.getElementById('searchInput').value=''}});
document.getElementById('searchInput').addEventListener('keypress',e=>{if(e.key==='Enter'){let v=e.target.value;if(v){pvc(v);e.target.value=''}}});

im();
