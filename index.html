<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>IAOS T4 · DUALIS U53700</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-deep: #050810;
      --surface: #0d1117;
      --surface-light: #161b27;
      --border-dim: rgba(99, 179, 237, 0.12);
      --accent: #63b3ed;
      --accent-2: #7c3aed;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --text-primary: #e2e8f0;
      --text-secondary: #94a3b8;
      --text-muted: #475569;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg-deep);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
    }

    .bg-texture {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 70% 50% at 15% 10%, rgba(124, 58, 237, 0.06) 0%, transparent 55%),
                  radial-gradient(ellipse 50% 45% at 85% 85%, rgba(99, 179, 237, 0.04) 0%, transparent 55%);
      pointer-events: none;
      z-index: 0;
    }

    .bg-grid {
      position: fixed;
      inset: 0;
      background-image: linear-gradient(rgba(99, 179, 237, 0.025) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(99, 179, 237, 0.025) 1px, transparent 1px);
      background-size: 50px 50px;
      pointer-events: none;
      z-index: 0;
    }

    #main-screen {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
      gap: 24px;
    }

    .hero-title {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(2.6rem, 7vw, 3.8rem);
      letter-spacing: -1px;
      background: linear-gradient(135deg, #ffffff 0%, #63b3ed 45%, #7c3aed 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-align: center;
    }

    .hero-sub {
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 3px;
      color: var(--text-muted);
      text-align: center;
    }

    .mic-container {
      position: relative;
      width: 170px;
      height: 170px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .mic-ring {
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(99, 179, 237, 0.08);
      animation: softPulse 3s ease-in-out infinite;
    }
    .mic-ring:nth-child(1) { width: 90px; height: 90px; animation-delay: 0s; }
    .mic-ring:nth-child(2) { width: 120px; height: 120px; animation-delay: 0.6s; }
    .mic-ring:nth-child(3) { width: 152px; height: 152px; animation-delay: 1.2s; }

    @keyframes softPulse {
      0%, 100% { transform: scale(1); opacity: 0.4; }
      50% { transform: scale(1.04); opacity: 1; }
    }

    #mic-btn {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      border: 2px solid rgba(99, 179, 237, 0.3);
      background: radial-gradient(circle, rgba(99, 179, 237, 0.12), transparent 90%);
      color: var(--accent);
      font-size: 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.25s ease;
      position: relative;
      z-index: 5;
      backdrop-filter: blur(4px);
    }
    #mic-btn:active { transform: scale(0.95); }
    #mic-btn.listening { border-color: var(--success); color: var(--success); }
    #mic-btn.speaking { border-color: var(--accent-2); color: var(--accent-2); }

    .status-bar {
      background: rgba(13, 17, 23, 0.85);
      border: 1px solid var(--border-dim);
      border-radius: 100px;
      padding: 10px 28px;
      font-size: 0.8rem;
      display: flex;
      align-items: center;
      gap: 10px;
      backdrop-filter: blur(12px);
    }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text-muted); }
    .status-dot.active { background: var(--success); box-shadow: 0 0 8px var(--success); }
    .status-dot.speaking { background: var(--accent-2); box-shadow: 0 0 8px var(--accent-2); }

    #toggle-panel-btn {
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(13, 17, 23, 0.9);
      border: 1px solid rgba(99, 179, 237, 0.25);
      color: var(--text-muted);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 200;
      backdrop-filter: blur(8px);
    }
    #toggle-panel-btn:hover { border-color: var(--accent); color: var(--accent); }

    #side-panel {
      position: fixed;
      top: 0;
      right: 0;
      height: 100%;
      width: min(94vw, 420px);
      background: rgba(7, 10, 20, 0.96);
      backdrop-filter: blur(24px);
      border-left: 1px solid var(--border-dim);
      z-index: 150;
      transform: translateX(100%);
      transition: transform 0.35s cubic-bezier(0.25, 0.8, 0.25, 1);
      display: flex;
      flex-direction: column;
    }
    #side-panel.open { transform: translateX(0); }

    .panel-header {
      padding: 16px 18px;
      border-bottom: 1px solid var(--border-dim);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .panel-title { font-family: 'Space Mono', monospace; font-size: 0.7rem; letter-spacing: 2px; color: var(--accent); }
    .close-panel { background: none; border: 1px solid var(--border-dim); color: var(--text-muted); width: 28px; height: 28px; border-radius: 6px; cursor: pointer; }
    .panel-body { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 16px; }
    .search-box { background: var(--surface-light); border: 1px solid var(--border-dim); border-radius: 10px; padding: 4px 4px 4px 14px; display: flex; gap: 8px; }
    #search-input { flex: 1; background: transparent; border: none; color: var(--text-primary); font-family: inherit; font-size: 0.9rem; outline: none; }
    .search-btn { background: rgba(99, 179, 237, 0.1); border: none; color: var(--accent); padding: 8px 16px; border-radius: 8px; font-weight: 600; cursor: pointer; }
    .ios-card { background: var(--surface); border: 1px solid var(--border-dim); border-radius: 12px; display: none; overflow: hidden; }
    .ios-card.visible { display: block; }
    .ios-header-card { padding: 14px; border-bottom: 1px solid var(--border-dim); font-weight: bold; }
    .ios-actions { padding: 10px 14px; border-bottom: 1px solid var(--border-dim); display: flex; flex-wrap: wrap; gap: 6px; }
    .ios-details { padding: 14px; font-size: 0.85rem; line-height: 1.5; }
    .btn { padding: 8px 16px; border-radius: 8px; font-size: 0.8rem; font-weight: 500; border: 1px solid var(--border-dim); background: rgba(99, 179, 237, 0.05); color: var(--text-primary); cursor: pointer; }
    .btn-primary { background: rgba(16, 185, 129, 0.15); border-color: rgba(16, 185, 129, 0.4); color: var(--success); }
    .btn-danger { background: rgba(239, 68, 68, 0.08); border-color: rgba(239, 68, 68, 0.3); color: var(--danger); }
    .chat-window { background: var(--surface); border: 1px solid var(--border-dim); border-radius: 12px; overflow: hidden; }
    .chat-messages { height: 200px; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px; }
    .msg { display: flex; gap: 8px; font-size: 0.85rem; max-width: 90%; }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg.assistant { align-self: flex-start; }
    .msg-content { padding: 8px 14px; border-radius: 12px; background: rgba(124, 58, 237, 0.15); border: 1px solid rgba(124, 58, 237, 0.25); }
    .msg.assistant .msg-content { background: rgba(99, 179, 237, 0.08); border: 1px solid rgba(99, 179, 237, 0.2); }
    .step-card { background: rgba(16, 185, 129, 0.08); border: 1px solid rgba(16, 185, 129, 0.3); border-radius: 10px; padding: 12px; margin-top: 6px; }
    .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--surface-light); border: 1px solid var(--border-dim); padding: 10px 22px; border-radius: 30px; z-index: 500; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
    .toast.show { opacity: 1; }
  </style>
</head>

<div class="bg-texture"></div>
<div class="bg-grid"></div>

</div>

  // Alias
  const ALIASES = { 'boite chaude':['061'],'pantographe':['054'],'patin':['071'],'frein friction':['083'],'batterie':['017','050'],'urgence':['002','048'],'secours':['002','048'],'cvs':['048'],'etf':['181'],'porte':['173','167'],'stm':['077'],'kvb':['077'] };

  function findIOS(q) {
    if(!q)return null;
    q=q.toLowerCase().trim();
    let numMatch=q.match(/(?:ios\s*)?(\d+)/i);
    if(numMatch){let n=numMatch[1].padStart(3,'0');if(IOS_DB[n])return IOS_DB[n];}
    for(let[alias,ids]of Object.entries(ALIASES))if(q.includes(alias))for(let id of ids)if(IOS_DB[id])return IOS_DB[id];
    let best=null,bestScore=0;
    for(let ios of Object.values(IOS_DB)){
      let score=0,desc=ios.desc.toLowerCase(),kw=(ios.kw||[]).join(' ').toLowerCase();
      if(q.includes(ios.id))score+=10;
      if(desc.includes(q))score+=5;
      if(kw.includes(q))score+=3;
      if(score>bestScore){bestScore=score;best=ios;}
    }
    return bestScore>=2?best:null;
  }

  function addMessage(t,sender='assistant'){let d=document.createElement('div');d.className=`msg ${sender}`;d.innerHTML=`<div class="msg-content">${t}</div>`;chatBox.appendChild(d);chatBox.scrollTop=chatBox.scrollHeight;}
  function speak(t){
    if(!window.speechSynthesis)return;
    window.speechSynthesis.cancel();
    let u=new SpeechSynthesisUtterance(t.replace(/<[^>]*>/g,''));
    u.lang='fr-FR';u.rate=0.9;
    isSpeaking=true;stopRecognition();micBtn.classList.add('speaking');statusDot.classList.add('speaking');statusText.textContent='Parle...';
    u.onend=()=>{isSpeaking=false;micBtn.classList.remove('speaking');statusDot.classList.remove('speaking');statusText.textContent='Micro prêt';if(micStarted)startRecognition();};
    speechSynthesis.speak(u);
  }
  function displayIOS(ios){
    currentIOS=ios;guideActive=false;
    document.getElementById('ios-card').classList.add('visible');
    document.getElementById('ios-header').innerHTML=`<strong>IOS ${ios.id}</strong> · ${ios.desc}`;
    document.getElementById('ios-details').innerHTML=`<div style="background:rgba(99,179,237,0.1);padding:12px;border-radius:8px;">${ios.actions || 'Procédure disponible dans le guidage.'}</div>`;
    addMessage(`<strong>IOS ${ios.id}</strong> : ${ios.desc}`);
    speak(`IOS ${ios.id.split('').join(' ')}. ${ios.desc.substring(0,100)}`);
  }
  function searchManual(){let q=searchInput.value.trim();if(q){addMessage(q,'user');let f=findIOS(q);if(f)displayIOS(f);else addMessage(`Aucun IOS trouvé pour "${q}".`);}}
  function startGuide(){if(!currentIOS){addMessage('Aucun IOS chargé.');speak('Aucun IOS en cours.');return;}guideActive=true;guideSteps=[{text:currentIOS.actions||'Suivez les instructions du manuel.',done:false}];guideIndex=0;renderStep();}
  function renderStep(){if(!guideActive||guideIndex>=guideSteps.length){cancelProcedure();return;}addMessage(`📋 ${guideSteps[guideIndex].text}`);speak(guideSteps[guideIndex].text);}
  function nextStep(){if(guideActive&&guideIndex<guideSteps.length-1)guideIndex++;renderStep();}
  function prevStep(){if(guideActive&&guideIndex>0)guideIndex--;renderStep();}
  function cancelProcedure(){guideActive=false;addMessage('Procédure annulée.');speak('Annulé.');}
  function goHome(){currentIOS=null;guideActive=false;document.getElementById('ios-card').classList.remove('visible');addMessage('Retour accueil.');}
  function newSearch(){goHome();searchInput.value='';searchInput.focus();}
  function showToast(msg){toast.textContent=msg;toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),3000);}

  const SpeechRecog=window.SpeechRecognition||window.webkitSpeechRecognition;
  function startRecognition(){if(!SpeechRecog||voiceActive||isSpeaking)return;let rec=new SpeechRecog();rec.lang='fr-FR';rec.continuous=false;rec.interimResults=false;rec.onstart=()=>{voiceActive=true;micBtn.classList.add('listening');statusDot.classList.add('active');statusText.textContent='Écoute...';};rec.onresult=e=>{let txt=e.results[0][0].transcript;addMessage(`🎤 ${txt}`,'user');let f=findIOS(txt);if(f)displayIOS(f);else if(txt.match(/(démarrer|guidage|commencer)/i)&&currentIOS)startGuide();else if(txt.match(/(suivant|suite|continuer)/i)&&guideActive)nextStep();else if(txt.match(/(précédent|retour)/i)&&guideActive)prevStep();else if(txt.match(/(annuler|stop|arrêter)/i))cancelProcedure();else if(txt.match(/(accueil|menu)/i))goHome();else addMessage(`Commande non reconnue: "${txt}"`);};rec.onerror=e=>{if(e.error==='not-allowed'){micStarted=false;showToast('Micro refusé. Vérifiez permissions.');}};rec.onend=()=>{voiceActive=false;if(micStarted&&!isSpeaking)setTimeout(startRecognition,500);};recognition=rec;rec.start();}
  function stopRecognition(){if(recognition){recognition.stop();recognition=null;}voiceActive=false;}
  micBtn.addEventListener('click',()=>{if(!micStarted){micStarted=true;startRecognition();}else if(voiceActive){stopRecognition();micStarted=false;micBtn.classList.remove('listening');statusDot.classList.remove('active');statusText.textContent='Micro en pause';}else if(!isSpeaking){micStarted=true;startRecognition();}});
  window.togglePanel=()=>{panelOpen=!panelOpen;sidePanel.classList.toggle('open',panelOpen);};
  window.searchManual=searchManual;window.startGuide=startGuide;window.nextStep=nextStep;window.prevStep=prevStep;window.cancelProcedure=cancelProcedure;window.goHome=goHome;window.newSearch=newSearch;
  searchInput.addEventListener('keydown',e=>{if(e.key==='Enter')searchManual();});
})();
