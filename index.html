<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>IAOS T4 · DUALIS U53700</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-deep: #050810;
      --surface: #0d1117;
      --surface-light: #161b27;
      --border-dim: rgba(99, 179, 237, 0.12);
      --accent: #63b3ed;
      --accent-2: #7c3aed;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --text-primary: #e2e8f0;
      --text-secondary: #94a3b8;
      --text-muted: #475569;
      --glow-success: 0 0 15px rgba(16, 185, 129, 0.2);
      --glow-accent: 0 0 15px rgba(99, 179, 237, 0.15);
      --glow-danger: 0 0 15px rgba(239, 68, 68, 0.15);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg-deep);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-tap-highlight-color: transparent;
    }

    .bg-texture {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 70% 50% at 15% 10%, rgba(124, 58, 237, 0.06) 0%, transparent 55%),
        radial-gradient(ellipse 50% 45% at 85% 85%, rgba(99, 179, 237, 0.04) 0%, transparent 55%);
      pointer-events: none;
      z-index: 0;
    }

    .bg-grid {
      position: fixed;
      inset: 0;
      background-image: linear-gradient(rgba(99, 179, 237, 0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(99, 179, 237, 0.025) 1px, transparent 1px);
      background-size: 50px 50px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── ÉCRAN PRINCIPAL ── */
    #main-screen {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
      gap: 24px;
    }

    .hero-title {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(2.6rem, 7vw, 3.8rem);
      letter-spacing: -1px;
      background: linear-gradient(135deg, #ffffff 0%, #63b3ed 45%, #7c3aed 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-align: center;
      line-height: 1.1;
    }

    .hero-sub {
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 3px;
      color: var(--text-muted);
      text-align: center;
      margin-top: 4px;
    }

    /* ── BOUTON MICRO ── */
    .mic-container {
      position: relative;
      width: 170px;
      height: 170px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .mic-ring {
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(99, 179, 237, 0.08);
      animation: softPulse 3s ease-in-out infinite;
    }

    .mic-ring:nth-child(1) {
      width: 90px;
      height: 90px;
      animation-delay: 0s;
    }
    .mic-ring:nth-child(2) {
      width: 120px;
      height: 120px;
      animation-delay: 0.6s;
    }
    .mic-ring:nth-child(3) {
      width: 152px;
      height: 152px;
      animation-delay: 1.2s;
    }

    @keyframes softPulse {
      0%,
      100% {
        transform: scale(1);
        opacity: 0.4;
      }
      50% {
        transform: scale(1.04);
        opacity: 1;
      }
    }

    #mic-btn {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      border: 2px solid rgba(99, 179, 237, 0.3);
      background: radial-gradient(circle, rgba(99, 179, 237, 0.12), transparent 90%);
      color: var(--accent);
      font-size: 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.25s ease;
      position: relative;
      z-index: 5;
      box-shadow: var(--glow-accent);
      backdrop-filter: blur(4px);
    }

    #mic-btn:active {
      transform: scale(0.95);
    }

    #mic-btn.listening {
      border-color: var(--success);
      color: var(--success);
      box-shadow: var(--glow-success);
      background: radial-gradient(circle, rgba(16, 185, 129, 0.18), transparent 85%);
    }

    #mic-btn.speaking {
      border-color: var(--accent-2);
      color: var(--accent-2);
      box-shadow: 0 0 20px rgba(124, 58, 237, 0.25);
      background: radial-gradient(circle, rgba(124, 58, 237, 0.18), transparent 85%);
    }

    #mic-btn.paused {
      border-color: var(--text-muted);
      color: var(--text-muted);
      box-shadow: none;
    }

    /* anneaux dynamiques */
    #mic-btn.listening~.mic-ring {
      border-color: rgba(16, 185, 129, 0.2);
    }
    #mic-btn.speaking~.mic-ring {
      border-color: rgba(124, 58, 237, 0.2);
    }

    /* ── BARRE ÉTAT ── */
    .status-bar {
      background: rgba(13, 17, 23, 0.85);
      border: 1px solid var(--border-dim);
      border-radius: 100px;
      padding: 10px 28px;
      font-size: 0.8rem;
      display: flex;
      align-items: center;
      gap: 10px;
      backdrop-filter: blur(12px);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-muted);
      flex-shrink: 0;
    }

    .status-dot.active {
      background: var(--success);
      box-shadow: 0 0 8px var(--success);
    }
    .status-dot.speaking {
      background: var(--accent-2);
      box-shadow: 0 0 8px var(--accent-2);
    }

    .wave-container {
      display: none;
      align-items: center;
      gap: 2px;
      margin-left: 6px;
    }
    .wave-container.active {
      display: flex;
    }
    .wave-bar {
      width: 3px;
      background: var(--success);
      border-radius: 2px;
      animation: wave 0.6s infinite alternate;
    }
    .wave-bar:nth-child(1) {
      height: 6px;
    }
    .wave-bar:nth-child(2) {
      height: 12px;
      animation-delay: 0.1s;
    }
    .wave-bar:nth-child(3) {
      height: 15px;
      animation-delay: 0.2s;
    }
    .wave-bar:nth-child(4) {
      height: 10px;
      animation-delay: 0.3s;
    }
    .wave-bar:nth-child(5) {
      height: 5px;
      animation-delay: 0.4s;
    }

    @keyframes wave {
      from {
        transform: scaleY(0.3);
      }
      to {
        transform: scaleY(1);
      }
    }

    /* ── BOUTON PANNEAU ── */
    #toggle-panel-btn {
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(13, 17, 23, 0.9);
      border: 1px solid rgba(99, 179, 237, 0.25);
      color: var(--text-muted);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 200;
      backdrop-filter: blur(8px);
      transition: all 0.25s;
    }

    #toggle-panel-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ── PANNEAU LATÉRAL ── */
    #side-panel {
      position: fixed;
      top: 0;
      right: 0;
      height: 100%;
      width: min(94vw, 420px);
      background: rgba(7, 10, 20, 0.96);
      backdrop-filter: blur(24px);
      border-left: 1px solid var(--border-dim);
      z-index: 150;
      transform: translateX(100%);
      transition: transform 0.35s cubic-bezier(0.25, 0.8, 0.25, 1);
      display: flex;
      flex-direction: column;
    }

    #side-panel.open {
      transform: translateX(0);
    }

    .panel-header {
      padding: 16px 18px;
      border-bottom: 1px solid var(--border-dim);
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(99, 179, 237, 0.03);
    }

    .panel-title {
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 2px;
      color: var(--accent);
    }

    .close-panel {
      background: none;
      border: 1px solid var(--border-dim);
      color: var(--text-muted);
      width: 28px;
      height: 28px;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .panel-body {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .mini-status {
      background: var(--surface);
      border: 1px solid var(--border-dim);
      border-radius: 8px;
      padding: 8px 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.75rem;
    }

    .search-box {
      background: var(--surface-light);
      border: 1px solid var(--border-dim);
      border-radius: 10px;
      padding: 4px 4px 4px 14px;
      display: flex;
      gap: 8px;
    }

    #search-input {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text-primary);
      font-family: inherit;
      font-size: 0.9rem;
      outline: none;
    }

    .search-btn {
      background: rgba(99, 179, 237, 0.1);
      border: none;
      color: var(--accent);
      padding: 8px 16px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
    }

    .ios-card {
      background: var(--surface);
      border: 1px solid var(--border-dim);
      border-radius: 12px;
      display: none;
      overflow: hidden;
    }

    .ios-card.visible {
      display: block;
    }

    .ios-header {
      padding: 14px;
      border-bottom: 1px solid var(--border-dim);
    }
    .ios-actions {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border-dim);
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .ios-details {
      padding: 14px;
    }

    .btn {
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 0.8rem;
      font-weight: 500;
      border: 1px solid var(--border-dim);
      background: rgba(99, 179, 237, 0.05);
      color: var(--text-primary);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: all 0.2s;
    }

    .btn-primary {
      background: rgba(16, 185, 129, 0.15);
      border-color: rgba(16, 185, 129, 0.4);
      color: var(--success);
    }
    .btn-danger {
      background: rgba(239, 68, 68, 0.08);
      border-color: rgba(239, 68, 68, 0.3);
      color: var(--danger);
    }

    .chat-window {
      background: var(--surface);
      border: 1px solid var(--border-dim);
      border-radius: 12px;
      overflow: hidden;
    }

    .chat-messages {
      height: 200px;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .msg {
      display: flex;
      gap: 8px;
      font-size: 0.85rem;
      max-width: 90%;
    }

    .msg.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }
    .msg.assistant {
      align-self: flex-start;
    }

    .msg-content {
      padding: 8px 14px;
      border-radius: 12px;
      background: rgba(124, 58, 237, 0.15);
      border: 1px solid rgba(124, 58, 237, 0.25);
    }

    .msg.assistant .msg-content {
      background: rgba(99, 179, 237, 0.08);
      border: 1px solid rgba(99, 179, 237, 0.2);
    }

    .step-card {
      background: rgba(16, 185, 129, 0.08);
      border: 1px solid rgba(16, 185, 129, 0.3);
      border-radius: 10px;
      padding: 12px;
      margin-top: 6px;
    }

    /* Guide vocal */
    .voice-guide {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background: rgba(5, 8, 16, 0.96);
      backdrop-filter: blur(20px);
      border-top: 1px solid var(--border-dim);
      padding: 14px 20px;
      z-index: 110;
      display: none;
    }

    .voice-guide.active {
      display: block;
    }
    .toast {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--surface-light);
      border: 1px solid var(--border-dim);
      padding: 10px 22px;
      border-radius: 30px;
      z-index: 500;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }
    .toast.show {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div class="bg-texture"></div>
  <div class="bg-grid"></div>

  <div id="main-screen">
    <div>
      <div class="hero-title">IAOS T4</div>
      <div class="hero-sub">SYSTÈME DE DÉPANNAGE · DUALIS</div>
    </div>

    <div class="mic-container">
      <div class="mic-ring"></div>
      <div class="mic-ring"></div>
      <div class="mic-ring"></div>
      <button id="mic-btn">🎤</button>
    </div>

    <div class="status-bar" id="status-bar">
      <span class="status-dot" id="status-dot"></span>
      <span id="status-text">Micro en attente</span>
      <div class="wave-container" id="wave-container">
        <span class="wave-bar"></span><span class="wave-bar"></span><span class="wave-bar"></span>
        <span class="wave-bar"></span><span class="wave-bar"></span>
      </div>
    </div>
  </div>

  <button id="toggle-panel-btn" onclick="togglePanel()">⚙️</button>

  <div id="side-panel">
    <div class="panel-header">
      <span class="panel-title">INFORMATIONS</span>
      <button class="close-panel" onclick="togglePanel()">✕</button>
    </div>
    <div class="panel-body">
      <div class="mini-status">
        <span id="mini-status-text">En attente</span>
        <span id="mini-mode">VEILLE</span>
      </div>
      <div class="search-box">
        <input type="text" id="search-input" placeholder="IOS, description..." autocomplete="off">
        <button class="search-btn" onclick="searchManual()">OK</button>
      </div>
      <div class="ios-card" id="ios-card">
        <div class="ios-header" id="ios-header">---</div>
        <div class="ios-actions">
          <button class="btn btn-primary" onclick="startGuide()">▶ Guidage</button>
          <button class="btn btn-danger" onclick="cancelProcedure()">✕ Annuler</button>
          <button class="btn" onclick="goHome()">⌂ Accueil</button>
          <button class="btn" onclick="newSearch()">🔍 Nouveau</button>
        </div>
        <div class="ios-details" id="ios-details"></div>
      </div>
      <div class="chat-window">
        <div class="chat-messages" id="chat-messages">
          <div class="msg assistant"><div class="msg-content">Bonjour. Dites <strong>"IOS"</strong> puis votre demande. Ex: <em>"IOS 061"</em> ou <em>"IOS boîte chaude"</em>.</div></div>
        </div>
      </div>
    </div>
  </div>

  <div class="voice-guide" id="voice-guide">
    <div style="font-weight: bold; margin-bottom: 4px;" id="guide-step">Étape</div>
    <div style="margin-bottom: 10px;" id="guide-text">...</div>
    <div style="display: flex; gap: 8px; flex-wrap: wrap;">
      <button onclick="answerGuide(true)" id="btn-yes" style="display:none;">✅ OUI</button>
      <button onclick="answerGuide(false)" id="btn-no" style="display:none;">❌ NON</button>
      <button onclick="prevStep()">◀ Précédent</button>
      <button onclick="nextStep()">Suivant ▶</button>
      <button onclick="cancelProcedure()">Annuler</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    (() => {
      // ÉTAT
      let isSpeaking = false,
        voiceActive = false,
        micStarted = false,
        panelOpen = false;
      let currentIOS = null,
        guideActive = false,
        guidePath = [],
        guideIndex = 0;
      let recognition = null;

      // DOM
      const micBtn = document.getElementById('mic-btn');
      const statusDot = document.getElementById('status-dot');
      const statusText = document.getElementById('status-text');
      const waveContainer = document.getElementById('wave-container');
      const sidePanel = document.getElementById('side-panel');
      const iosCard = document.getElementById('ios-card');
      const voiceGuide = document.getElementById('voice-guide');
      const chatBox = document.getElementById('chat-messages');
      const searchInput = document.getElementById('search-input');
      const toast = document.getElementById('toast');

      // BASE IOS COMPLÈTE
      const IOS_DB = {
        '000': { id: '000', type: 'MA', pri: 'h', desc: 'Boucle de sécurité des portes fermées verrouillées isolée', kw: ['000', 'boucle',
            'porte', 'verrou'
          ], instr: ['Arrêt 1er quai', 'Aviser PC — Appliquer GD'], tree: [{ t: 'Arrêtez le train au 1er quai disponible.', d: false },
            { t: 'Avisez le PC immédiatement.', d: false }, { t: 'Appliquez le GD.', d: false },
            { t: '✅ Dépannage terminé.', d: false, fin: true }
          ] },
        '001': { id: '001', type: 'FU', pri: 'm', desc: 'FU inhibé si SAI en zone de quai', kw: ['001', 'fu', 'sai'],
          instr: ['Aviser PC'], tree: [{ t: 'Le système fonctionne normalement — le FU est inhibé en zone de quai. Avisez le PC.',
              d: false }, { t: '✅ Dépannage terminé.', d: false, fin: true }
          ] },
        '002': { id: '002', type: 'BP', pri: 'h', desc: "Défaut majeur du relais de freinage d'urgence", kw: ['002', 'relais',
            'freinage', 'urgence', 'secours'
          ], instr: ['Arrêt immédiat', 'Aviser PC — DEMANDER SECOURS'], tree: [
            { t: '🚨 URGENCE — Appliquez immédiatement le CHAPITRE 4 — SECOURS.', d: false, fin: true }
          ] },
        '003': { id: '003', type: 'MA', pri: 'h', desc: 'FU SAI intempestif', kw: ['003', 'fu', 'sai', 'intempestif', 'fms'],
          instr: ['Arrêt 1er quai', 'Aviser PC — Appliquer GD'], tree: [
            { t: 'Placez le commutateur Z(IS)FMSQUA en AEL1 sur ISOLÉ.', d: false },
            { t: "L'IOS n°001 est-il apparu ?", d: true, oui: [
                { t: "IOS 001 apparu — système partiellement opérationnel. Avisez le PC.", d: false },
                { t: '✅ Dépannage terminé.', d: false, fin: true }
              ], non: [
                { t: "IOS 001 non apparu — situation anormale. Avisez le PC immédiatement.", d: false },
                { t: '✅ Procédure terminée. Conformez-vous aux instructions PC.', d: false, fin: true }
              ] }
          ] },
        '004': { id: '004', type: 'IDA', pri: 'h', desc: "Défaut relais freinage d'urgence bogie 1 C2B", kw: ['004', 'relais',
            'freinage', 'bogie', 'c2b1'
          ], instr: ['Arrêt 1er quai', 'Aviser PC — Appliquer GD'], tree: [
            { t: 'Placez Z(SE) en AEL1 sur SECOURS.', d: false },
            { t: 'Placez Z(IS)F en AEL1 sur C2B1 — bogie à isoler.', d: false },
            { t: 'Placez Z(CO)EV en AEL1 sur ON — les cylindres de frein sont mis sous pression.', d: false },
            { t: "Le symbole Frein à friction isolé est-il affiché sur l'écran principal ?", d: true, oui: [
                { t: "Contrôlez l'apparition de l'IOS n°091.", d: false },
                { t: "Effectuez un test EFAS complet sans tenir compte de l'allumage de la lampe LS(DEF)TEC.", d: false },
                { t: 'Appliquez la page 499 — Incident de frein. Vitesse max 30 km/h. Perte de progressivité traction/freinage.',
                  d: false },
                { t: 'Avisez le PC pour instructions — évacuation éventuelle des voyageurs.', d: false },
                { t: '✅ Dépannage terminé.', d: false, fin: true }
              ], non: [{ t: '🚨 Anomalie — Avisez le PC et demandez secours immédiatement.', d: false, fin: true }] }
          ] },
        '005': { id: '005', type: 'IDA', pri: 'h', desc: "Incohérence boucle de sécurité porte", kw: ['005', 'incoherence',
            'boucle', 'porte'
          ], instr: ['Arrêt 1er quai', 'Aviser PC — Appliquer GD'], tree: [
            { t: 'Effectuez une annonce aux voyageurs : fermeture imminente des portes.', d: false },
            { t: 'Appuyez sur BPL(AUT-OP)DO et/ou BPL(AUT-OP)GA selon le côté desservi.', d: false },
            { t: 'Commandez la fermeture des portes.', d: false },
            { t: 'Les lampes LS-FP-GA et LS-FP-DO sont-elles éteintes ?', d: true, oui: [
                { t: "✅ Ne plus tenir compte de l'IOS 005. Dépannage terminé.", d: false, fin: true }
              ], non: [
                { t: "Appliquez le défaut 9501 — LS-FP ne s'éteignent pas après fermeture des portes.", d: false, fin: true }
              ] }
          ] },
        '006': { id: '006', type: 'FU', pri: 'h', desc: "FU permanent suite à un défaut de la boucle porte", kw: ['006', 'fu',
            'permanent', 'boucle', 'porte'
          ], instr: ['Arrêt 1er quai', 'Aviser PC — Appliquer GD'], tree: [
            { t: 'Effectuez une annonce aux voyageurs : fermeture imminente des portes.', d: false },
            { t: 'Commandez la fermeture des portes. Observez les lampes LS-FP-GA et LS-FP-DO.', d: false },
            { t: 'Les lampes LS-FP-GA et LS-FP-DO sont-elles éteintes ?', d: true, oui: [
                { t: 'Essayez de reprendre la traction.', d: false },
                { t: 'La traction a-t-elle été reprise ?', d: true, oui: [
                    { t: "Ne plus tenir compte de l'IOS 006. Avisez PC : Application IOS 006 — 1er cas.", d: false },
                    { t: '✅ Dépannage terminé.', d: false, fin: true }
                  ], non: [

      // FONCTIONS UI
      function setMicUI(state) {
        micBtn.className = '';
        statusDot.className = 'status-dot';
        waveContainer.classList.remove('active');
        if (state === 'listen') {
          micBtn.classList.add('listening');
          statusDot.classList.add('active');
          statusText.textContent = 'Écoute...';
          waveContainer.classList.add('active');
        } else if (state === 'speaking') {
          micBtn.classList.add('speaking');
          statusDot.classList.add('speaking');
          statusText.textContent = 'Réponse vocale...';
        } else if (state === 'paused') {
          micBtn.classList.add('paused');
          statusText.textContent = 'Micro en pause';
        } else {
          statusText.textContent = 'Micro prêt';
        }
      }

      function addMessage(text, sender = 'assistant') {
        const div = document.createElement('div');
        div.className = `msg ${sender}`;
        div.innerHTML = `<div class="msg-content">${text}</div>`;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
      }

      function updateStatus(text, mode) {
        document.getElementById('mini-status-text').textContent = text;
        document.getElementById('mini-mode').textContent = mode;
      }

      function showToast(msg) {
        toast.textContent = msg;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3000);
      }

      // RECHERCHE AMÉLIORÉE
      function findIOS(query) {
        if (!query) return null;
        query = query.toLowerCase().trim();

        // 1. Recherche par numéro exact (ex: "061", "ios 061", "ios061")
        const numMatch = query.match(/(?:ios\s*)?(\d+)/i);
        if (numMatch) {
          const num = numMatch[1].padStart(3, '0');
          if (IOS_DB[num]) return IOS_DB[num];
        }

        // 2. Recherche dans les alias
        for (const [alias, ids] of Object.entries(ALIASES)) {
          if (query.includes(alias)) {
            for (const id of ids) {
              if (IOS_DB[id]) return IOS_DB[id];
            }
          }
        }

        // 3. Recherche par mots-clés dans la description
        const words = query.split(/\s+/).filter(w => w.length >= 3);
        let bestMatch = null;
        let bestScore = 0;

        for (const ios of Object.values(IOS_DB)) {
          let score = 0;
          const desc = ios.desc.toLowerCase();
          const keywords = (ios.kw || []).join(' ').toLowerCase();

          for (const word of words) {
            if (desc.includes(word)) score += 3;
            if (keywords.includes(word)) score += 2;
            // Bonus pour correspondance exacte du numéro
            if (word === ios.id || word === parseInt(ios.id).toString()) score += 10;
          }

          if (score > bestScore) {
            bestScore = score;
            bestMatch = ios;
          }
        }

        return bestScore >= 2 ? bestMatch : null;
      }

      function displayIOS(ios) {
        currentIOS = ios;
        guideActive = false;
        voiceGuide.classList.remove('active');
        iosCard.classList.add('visible');
        document.getElementById('ios-header').innerHTML = `<strong>IOS ${ios.id}</strong> · ${ios.desc}`;
        document.getElementById('ios-details').innerHTML =
          '<p>Procédure chargée. Dites <strong>"démarrer"</strong> ou cliquez Guidage.</p>';
        addMessage(`<strong>IOS ${ios.id}</strong> : ${ios.desc}`);
        updateStatus(`IOS ${ios.id}`, 'DÉPANNAGE');
        speak(`IOS ${ios.id.split('').join(' ')} chargé. ${ios.desc}`);
      }

      function searchManual() {
        const q = searchInput.value;
        if (q) {
          addMessage(q, 'user');
          const ios = findIOS(q);
          if (ios) displayIOS(ios);
          else {
            addMessage('Aucun IOS trouvé pour "' + q + '".');
            speak('Aucun résultat.');
          }
        }
      }

      // GUIDE
      function startGuide() {
        if (!currentIOS) {
          addMessage('Aucun IOS sélectionné.');
          speak('Aucun IOS en cours.');
          return;
        }
        guideActive = true;
        guidePath = [...currentIOS.tree];
        guideIndex = 0;
        voiceGuide.classList.add('active');
        renderStep();
      }

      function renderStep() {
        if (!guideActive || guideIndex >= guidePath.length) {
          finishGuide('✅ Terminé.');
          return;
        }
        const step = guidePath[guideIndex];
        if (step.fin) {
          finishGuide(step.t || 'Terminé.');
          return;
        }
        document.getElementById('guide-step').textContent = `Étape ${guideIndex+1}/${guidePath.length}`;
        document.getElementById('guide-text').textContent = step.t;
        document.getElementById('btn-yes').style.display = step.d ? 'inline-block' : 'none';
        document.getElementById('btn-no').style.display = step.d ? 'inline-block' : 'none';
        addMessage(`<div class="step-card">${step.t}</div>`);
        speak(step.t);
      }

      function answerGuide(isYes) {
        if (!guideActive) return;
        const step = guidePath[guideIndex];
        if (!step || !step.d) return;
        addMessage(isYes ? '✅ OUI' : '❌ NON', 'user');
        const next = isYes ? step.oui : step.non;
        if (!next || next.length === 0) {
          finishGuide('Terminé.');
          return;
        }
        guidePath = next;
        guideIndex = 0;
        renderStep();
      }

      function nextStep() {
        if (guideActive && guidePath[guideIndex] && !guidePath[guideIndex].d) {
          guideIndex++;
          renderStep();
        }
      }

      function prevStep() {
        if (guideActive && guideIndex > 0) {
          guideIndex--;
          renderStep();
        }
      }

      function cancelProcedure() {
        guideActive = false;
        voiceGuide.classList.remove('active');
        addMessage('Procédure annulée.');
        updateStatus('Annulé', 'VEILLE');
      }

      function finishGuide(msg) {
        guideActive = false;
        voiceGuide.classList.remove('active');
        addMessage(msg);
        speak(msg);
        updateStatus('Terminé', 'VEILLE');
      }

      function goHome() {
        currentIOS = null;
        guideActive = false;
        iosCard.classList.remove('visible');
        voiceGuide.classList.remove('active');
        updateStatus('Accueil', 'VEILLE');
        addMessage('Retour à l\'accueil.');
      }

      function newSearch() {
        goHome();
        searchInput.value = '';
        searchInput.focus();
      }

      // COMMANDES VOCALES
      function processVoice(text) {
        addMessage(`🎤 ${text}`, 'user');
        const t = text.toLowerCase().trim();

        // Salutations
        if (/\b(salam|asalam|assalam)\b/.test(t)) {
          addMessage('Wa Aleykoum Salam. Comment vous aider ?');
          speak('Wa Aleykoum Salam.');
          return;
        }
        if (/\bbonjour\b/.test(t)) {
          addMessage('Bonjour, ravie de me rendre utile.');
          speak('Bonjour, ravie de me rendre utile.');
          return;
        }
        if (/\b(salut|hey|hello|coucou)\b/.test(t)) {
          addMessage('Hey boss ! Que puis-je faire ?');
          speak('Hey boss !');
          return;
        }

        // Date / Heure
        if (/\b(date|heure|quel jour|quelle heure|aujourd'hui|maintenant)\b/.test(t)) {
          const now = new Date();
          const jours = ['dimanche', 'lundi', 'mardi', 'mercredi', 'jeudi', 'vendredi', 'samedi'];
          const mois = ['janvier', 'février', 'mars', 'avril', 'mai', 'juin', 'juillet', 'août', 'septembre', 'octobre',
            'novembre', 'décembre'
          ];
          const str =
            `Nous sommes le ${jours[now.getDay()]} ${now.getDate()} ${mois[now.getMonth()]} ${now.getFullYear()}, il est ${now.getHours()}h${String(now.getMinutes()).padStart(2,'0')}.`;
          addMessage(str);
          speak(str);
          return;
        }

        // Commandes navigation
        if (/\b(passe à la suite|suivant|suite|continuer|après|ok|fait|effectué)\b/.test(t)) {
          if (guideActive) nextStep();
          else {
            addMessage('Aucun guidage en cours.');
            speak('Aucun guidage en cours.');
          }
          return;
        }
        if (/\b(reviens|précédent|retour|en arrière|recule)\b/.test(t)) {
          if (guideActive) prevStep();
          else {
            addMessage('Aucun guidage en cours.');
            speak('Aucun guidage en cours.');
          }
          return;
        }
        if (/\b(recommence|recommencer|refaire|depuis le début)\b/.test(t)) {
          if (currentIOS) startGuide();
          else {
            addMessage('Aucun IOS en cours.');
            speak('Aucun IOS en cours.');
          }
          return;
        }
        if (/\b(répète|redis|encore)\b/.test(t)) {
          if (guideActive && guidePath[guideIndex]) speak(guidePath[guideIndex].t);
          else if (currentIOS) speak(currentIOS.desc);
          else {
            addMessage('Rien à répéter.');
            speak('Rien à répéter.');
          }
          return;
        }
        if (/\b(est.?ce fini|fini|terminé|dépannage terminé)\b/.test(t)) {
          const msg = guideActive ? 'Le guidage est en cours.' : (currentIOS ? 'IOS toujours affiché.' :
            'Aucun dépannage en cours.');
          addMessage(msg);
          speak(msg);
          return;
        }
        if (/\b(annule|stop|arrête)\b/.test(t)) {
          cancelProcedure();
          return;
        }
        if (/\b(accueil|menu principal)\b/.test(t)) {
          goHome();
          return;
        }
        if (/\b(nouvel? ios|autre recherche)\b/.test(t)) {
          newSearch();
          return;
        }

        // Oui / Non en guidage
        if (guideActive && guidePath[guideIndex] && guidePath[guideIndex].d) {
          if (/^(oui|yes|affirmatif|exact|correct|si|ouais)/.test(t)) {
            answerGuide(true);
            return;
          }
          if (/^(non|no|négatif|faux|aucun)/.test(t)) {
            answerGuide(false);
            return;
          }
        }

        // Démarrer guidage
        if (/\b(démarrer|commencer|guidage|lancer)\b/.test(t)) {
          startGuide();
          return;
        }

        // Recherche IOS — priorité absolue
        const ios = findIOS(t);
        if (ios) {
          displayIOS(ios);
        } else {
          addMessage('Aucun IOS trouvé pour "' + t + '". Essayez un numéro ou un mot-clé.');
          speak('Aucun IOS trouvé. Essayez un autre terme.');
        }
      }

      // SYNTHÈSE VOCALE
      function speak(text, callback) {
        if (!window.speechSynthesis) return;
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(text.replace(/<[^>]*>/g, ''));
        u.lang = 'fr-FR';
        u.rate = 0.9;
        const voice = speechSynthesis.getVoices().find(v => v.lang.startsWith('fr'));
        if (voice) u.voice = voice;
        isSpeaking = true;
        stopRecognition();
        setMicUI('speaking');
        u.onend = () => {
          isSpeaking = false;
          setMicUI('idle');
          if (callback) callback();
          if (micStarted) startRecognition();
        };
        speechSynthesis.speak(u);
      }

      // RECONNAISSANCE VOCALE
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

      function startRecognition() {
        if (!SpeechRecognition || voiceActive || isSpeaking) return;
        const rec = new SpeechRecognition();
        rec.lang = 'fr-FR';
        rec.continuous = false;
        rec.interimResults = false;
        rec.onstart = () => {
          voiceActive = true;
          setMicUI('listen');
        };
        rec.onresult = (e) => {
          processVoice(e.results[0][0].transcript);
        };
        rec.onerror = (e) => {
          voiceActive = false;
          if (e.error === 'not-allowed') {
            micStarted = false;
            setMicUI('idle');
            showToast('Micro refusé. Vérifiez les permissions.');
          }
        };
        rec.onend = () => {
          voiceActive = false;
          if (micStarted && !isSpeaking) {
            setMicUI('idle');
            setTimeout(startRecognition, 500);
          }
        };
        recognition = rec;
        rec.start();
      }

      function stopRecognition() {
        if (recognition) {
          recognition.stop();
          recognition = null;
        }
        voiceActive = false;
      }

      // BOUTON MICRO
      micBtn.addEventListener('click', () => {
        if (!micStarted) {
          micStarted = true;
          startRecognition();
        } else if (voiceActive) {
          stopRecognition();
          micStarted = false;
          setMicUI('paused');
        } else if (!isSpeaking) {
          micStarted = true;
          startRecognition();
        }
      });

      // PANNEAU
      window.togglePanel = () => {
        panelOpen = !panelOpen;
        sidePanel.classList.toggle('open', panelOpen);
      };

      // INIT
      window.searchManual = searchManual;
      window.startGuide = startGuide;
      window.nextStep = nextStep;
      window.prevStep = prevStep;
      window.answerGuide = answerGuide;
      window.cancelProcedure = cancelProcedure;
      window.goHome = goHome;
      window.newSearch = newSearch;
      searchInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') searchManual();
      });
      speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
    })();
